<html lang="de">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="black-logo.png" media="(prefers-color-scheme: light)">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; display: flex; height: 100vh; margin: 0; color: white; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .wave-bar { width: 3px; border-radius: 2px; background: white; transition: height 0.08s ease-out; }
        #pv-recording-ui { transition: transform 0.15s ease-out; }
        .sidebar-collapsed { width: 54px !important; padding: 12px 8px !important; align-items: center !important; }
        .sidebar-collapsed .sidebar-hide { display: none !important; }
        .sidebar-collapsed .sidebar-header { justify-content: center !important; margin-bottom: 16px !important; }
        .sidebar-collapsed .sidebar-header > *:not(.sidebar-logo) { display: none !important; }
        .sidebar-collapsed nav a { justify-content: center; padding: 12px; border-radius: 12px; }
        .sidebar-collapsed nav a span { display: none; }
        .sidebar-collapsed nav a svg { margin: 0; width: 28px; height: 28px; }
        .sidebar-collapsed #sidebar-auth { align-items: center; }
        .sidebar-collapsed #sidebar-auth button { display: none; }
        .sidebar-collapsed #sidebar-auth > div { justify-content: center; }
        .sidebar-collapsed #sidebar-auth > div > div.flex-1 { display: none; }
        .sidebar-collapsed #sidebar-auth .go-pro-card { display: none; }
        aside#sidebar { transition: width 0.2s ease; }
    
        /* ===== RESPONSIVE / MOBILE ===== */
        /* Prevent iOS zoom on input focus */
        input, textarea, select { font-size: 16px !important; }
        /* Fix 100vh on mobile browsers */
        @supports (height: 100dvh) { body { height: 100dvh; } }
        /* Smooth scrolling on iOS */
        * { -webkit-overflow-scrolling: touch; }
        /* Fix tap highlight */
        * { -webkit-tap-highlight-color: transparent; }

        /* Tablet */
        @media (max-width: 1024px) {
            #sidebar { width: 88px !important; padding: 12px 8px !important; }
            #sidebar .sidebar-hide { display: none !important; }
            #sidebar .sidebar-header { justify-content: center; }
            #sidebar #sidebar-auth { align-items: center; }
            #sidebar #sidebar-auth button { display: none; }
            #sidebar #sidebar-auth > div { justify-content: center; }
            #sidebar #sidebar-auth > div > div.flex-1 { display: none; }
            #sidebar #sidebar-auth .go-pro-card { display: none; }
            #sidebar nav { gap: 4px !important; }
            #sidebar nav a { flex-direction: column; justify-content: center; align-items: center; padding: 10px 4px; border-radius: 12px; gap: 4px !important; }
            #sidebar nav a span { display: block !important; font-size: 10px !important; opacity: 0.7; text-align: center; line-height: 1.2; }
            #sidebar nav a svg { margin: 0; width: 24px; height: 24px; }
            .mobile-menu-btn { display: none !important; }
        }

        /* Mobile */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed !important;
                left: -300px;
                top: 0;
                height: 100vh;
                z-index: 1000;
                width: 280px !important;
                transition: left 0.3s ease;
            }
            #sidebar.mobile-open { left: 0; }
            #sidebar .sidebar-hide { display: flex !important; }
            #sidebar .sidebar-header { justify-content: space-between; }
            #sidebar #sidebar-auth > div > div.flex-1 { display: block; }
            #sidebar nav a { justify-content: flex-start; padding: 8px 12px; }
            #sidebar nav a span { display: inline; }

            .mobile-backdrop {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .mobile-backdrop.active { display: block; }
            .mobile-menu-btn { display: flex !important; }
        }

        @media (max-width: 768px) {
            .doc-grid, .project-grid { grid-template-columns: 1fr !important; }
        }

    </style>
</head>

    <!-- Main -->

                                        <div class="flex items-center gap-2">

                            <div class="relative">
                                <button id="pv-ellipsis-btn" class="p-2 text-[#9ca3af] hover:text-white transition-colors rounded-full hover:bg-[#3f3f3f]">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle></svg>
                                </button>
                                <div id="pv-ellipsis-dd" style="display:none; position:absolute; top:100%; left:50%; transform:translateX(-50%); margin-top:8px; width:260px; background:#2a2a2a; border:1px solid #3e3e3e; border-radius:16px; box-shadow:0 15px 40px rgba(0,0,0,0.5); overflow:hidden; z-index:50;">
                                    <!-- Search Web -->
                                    <button class="w-full flex items-center gap-3 px-4 py-3 hover:bg-[#353535] transition-colors">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                                        <span class="text-white text-[14px]">Search the web</span>
                                    </button>
                                    <!-- Deep Research -->
                                    <button class="w-full flex items-center gap-3 px-4 py-3 hover:bg-[#353535] transition-colors">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                                        <span class="text-white text-[14px]">Deep research</span>
                                    </button>
                                    <!-- Canva -->
                                    <button class="w-full flex items-center gap-3 px-4 py-3 hover:bg-[#353535] transition-colors border-t border-[#3e3e3e]">
                                        <img src="https://1000logos.net/wp-content/uploads/2020/03/Canva-icon.png" width="34" height="34" class="shrink-0 rounded object-contain" alt="Canva" style="margin:-8px 0 -8px -8px" />
                                        <span class="text-white text-[14px] -ml-2">Canva</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button id="pv-mic-btn" class="p-2.5 mr-1 text-[#9ca3af] hover:text-white transition-colors rounded-full hover:bg-[#3f3f3f]">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                            </button>
                            <button id="new-chat-send" class="w-[38px] h-[38px] bg-white rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors mr-1 shadow-sm">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Tabs: Chats | Sources -->
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center gap-1">
                        <button class="tab-btn px-4 py-1.5 rounded-lg text-[13px] font-medium transition-colors" data-tab="chats">Chats</button>
                        <button class="tab-btn px-4 py-1.5 rounded-lg text-[13px] font-medium transition-colors" data-tab="sources">Sources</button>
                    </div>
                    <div class="relative">
                        <button id="sort-btn" class="items-center gap-1.5 text-[#888] text-[13px] cursor-pointer hover:text-white transition-colors border border-[#333] rounded-lg px-3 py-1.5" style="display:none;">
                            <span id="sort-label">Newest</span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        <div id="sort-dropdown" style="display:none; position:absolute; top:100%; right:0; margin-top:6px; background:#2a2a2a; border:1px solid #3a3a3a; border-radius:14px; padding:6px; box-shadow:0 12px 40px rgba(0,0,0,0.6); z-index:50; min-width:160px;">
                            <button class="sort-option w-full text-left px-4 py-3 text-[14px] font-medium rounded-lg hover:bg-[#333] transition-colors text-white" data-sort="newest">Newest</button>
                            <button class="sort-option w-full text-left px-4 py-3 text-[14px] font-medium rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-sort="oldest">Oldest</button>
                            <button class="sort-option w-full text-left px-4 py-3 text-[14px] font-medium rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-sort="alpha">Alphabetical</button>
                        </div>
                    </div>
                </div>

                <!-- Tab: Chats Content -->
                <div id="tab-chats">
                    <div id="chats-list" class="space-y-2"></div>
                    <div id="chats-empty" class="flex flex-col items-center py-20 text-center">
                        <p class="text-white text-[15px] font-semibold mb-1">No chats yet</p>
                        <p class="text-[#888] text-[13px]">Chats in <span id="empty-project-name"></span> will appear here</p>
                    </div>
                </div>

                <!-- Tab: Sources Content -->
                <div id="tab-sources" class="hidden">
                    <!-- Add sources button -->
                    <button id="add-source-btn" class="flex items-center gap-3 w-full py-3 text-left hover:opacity-80 transition-opacity mb-1">
                        <div class="w-9 h-9 rounded-full bg-[#333] flex items-center justify-center">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </div>
                        <span class="text-white text-[14px] font-medium">Add sources</span>
                    </button>
                    <div class="h-px bg-[#2a2a2a] mb-3"></div>
                    <div id="sources-list" class="space-y-1"></div>
                    <div id="sources-empty" class="flex flex-col items-center py-16 text-center">
                        <p class="text-[#888] text-[14px] mb-1">No sources yet</p>
                        <p class="text-[#555] text-[13px]">Upload files to use as context in this project</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Custom Popup -->
    <div id="popup-backdrop" style="display:none; position:fixed; top:0; left:280px; right:0; bottom:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:9998;"></div>
    <div id="popup-modal" style="display:none; position:fixed; top:50%; left:calc(280px + (100vw - 280px) / 2); transform:translate(-50%,-50%); z-index:9999; width:420px; background:#0e0e0e; border:1px solid #222; border-radius:20px; padding:28px; box-shadow:0 25px 50px rgba(0,0,0,0.5);">
        <button id="popup-close" style="position:absolute; top:14px; right:14px; background:none; border:none; cursor:pointer; color:#888;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        <h3 id="popup-title" style="margin:0 0 4px; font-size:17px; font-weight:600; color:white;"></h3>
        <p id="popup-desc" style="margin:0 0 16px; font-size:13px; color:#888;"></p>
        <input id="popup-input" type="text" style="width:100%; background:#1e1e1e; border:1px solid #333; color:white; border-radius:10px; padding:10px 14px; font-size:14px; outline:none; font-family:inherit; box-sizing:border-box; margin-bottom:16px;" />
        <div style="display:flex; gap:8px; justify-content:flex-end;">
            <button id="popup-cancel" style="padding:8px 18px; background:transparent; border:1px solid #333; border-radius:8px; color:#888; font-size:13px; cursor:pointer; font-family:inherit;">Cancel</button>
            <button id="popup-confirm" style="padding:8px 20px; background:white; border:none; border-radius:8px; color:black; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;">Create</button>
        </div>
    </div>

    <input type="file" id="file-upload" multiple class="hidden" />

    <script>
        // Auth provided by auth-modal.js
        function getProjects() { const u = getCurrentUser(); return u ? JSON.parse(localStorage.getItem('retrac_projects_' + u.email) || '[]') : []; }
        function saveProjects(p) { const u = getCurrentUser(); if (u) localStorage.setItem('retrac_projects_' + u.email, JSON.stringify(p)); }

        const idx = parseInt(new URLSearchParams(location.search).get('id'));
        let projects = getProjects();
        let project = projects[idx];
        if (!project) location.href = 'projects.html';
        if (!project.chats) project.chats = [];
        if (!project.sources) project.sources = [];

        document.getElementById('project-title').textContent = project.name;
        document.getElementById('empty-project-name').textContent = project.name;
        document.getElementById('new-chat-input').placeholder = `New Chat in ${project.name}`;
        document.title = project.name + ' - Retrac';

        // Popup
        let popupCb = null;
        function showPopup(title, desc, ph, btn) {
            return new Promise(r => {
                document.getElementById('popup-backdrop').style.display = 'block';
                document.getElementById('popup-modal').style.display = 'block';
                document.getElementById('popup-title').textContent = title;
                document.getElementById('popup-desc').textContent = desc;
                document.getElementById('popup-input').value = '';
                document.getElementById('popup-input').placeholder = ph;
                document.getElementById('popup-confirm').textContent = btn;
                document.getElementById('popup-input').focus();
                popupCb = r;
            });
        }
        function closePopup(v) { document.getElementById('popup-backdrop').style.display = 'none'; document.getElementById('popup-modal').style.display = 'none'; if (popupCb) { popupCb(v); popupCb = null; } }
        document.getElementById('popup-close').onclick = () => closePopup(null);
        document.getElementById('popup-cancel').onclick = () => closePopup(null);
        document.getElementById('popup-backdrop').onclick = () => closePopup(null);
        document.getElementById('popup-confirm').onclick = () => closePopup(document.getElementById('popup-input').value.trim());
        document.getElementById('popup-input').onkeydown = (e) => { if (e.key === 'Enter') closePopup(document.getElementById('popup-input').value.trim()); if (e.key === 'Escape') closePopup(null); };

        // Tabs
        let activeTab = 'chats';
        function setTab(name) {
            activeTab = name;
            document.querySelectorAll('.tab-btn').forEach(t => {
                t.style.background = t.dataset.tab === name ? '#333' : 'transparent';
                t.style.color = t.dataset.tab === name ? 'white' : '#888';
            });
            document.getElementById('tab-chats').classList.toggle('hidden', name !== 'chats');
            document.getElementById('tab-sources').classList.toggle('hidden', name !== 'sources');
            document.getElementById('sort-btn').style.display = name === 'sources' ? 'flex' : 'none';
        }
        document.querySelectorAll('.tab-btn').forEach(t => t.addEventListener('click', () => setTab(t.dataset.tab)));
        setTab('chats');

        // Current selected model
        let pvCurrentModel = document.getElementById('pv-model-label')?.textContent || 'Gemini 3 Pro';

        // New chat input - sends to AI and stores response
        async function createNewChat() {
            const inp = document.getElementById('new-chat-input');
            const val = inp.value.trim();
            if (!val) return;
            const name = val.length > 40 ? val.slice(0, 40) + '...' : val;
            const chat = { name, messages: [{ role: 'user', content: val }], createdAt: Date.now() };
            project.chats.push(chat);
            inp.value = '';
            saveProjects(projects);
            renderChats();

            // Send to AI
            let fullResponse = '';
            await RetracAPI.streamChat({
                model: pvCurrentModel,
                messages: [{ role: 'user', content: val }],
                onThinking: () => {},
                onText: (text) => { fullResponse += text; },
                onError: (err) => { fullResponse = 'Error: ' + err; },
                onDone: () => {
                    if (fullResponse) {
                        chat.messages.push({ role: 'assistant', content: fullResponse });
                        saveProjects(projects);
                        renderChats();
                    }
                }
            });
        }

        document.getElementById('new-chat-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); createNewChat(); }
        });
        document.getElementById('new-chat-send').addEventListener('click', createNewChat);

        // Render chats
        function renderChats() {
            const list = document.getElementById('chats-list');
            const empty = document.getElementById('chats-empty');

            if (project.chats.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.innerHTML = project.chats.map((c, i) => {
                const lastMsg = c.messages?.length ? (c.messages[c.messages.length - 1].content || c.messages[c.messages.length - 1].text || '') : '';
                const preview = lastMsg.length > 80 ? lastMsg.slice(0, 80) + '...' : lastMsg;
                const date = c.createdAt ? new Date(c.createdAt).toLocaleDateString('de-DE', { day: 'numeric', month: 'short' }) : '';
                return `
                <a href="index.html" class="flex items-center gap-4 px-4 py-3.5 rounded-xl hover:bg-[#2a2a2a] transition-colors group">
                    <div class="w-9 h-9 rounded-full bg-[#333] flex items-center justify-center shrink-0">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-white text-[14px] font-medium truncate">${c.name}</p>
                        <p class="text-[#666] text-[12px] truncate">${preview || 'No messages'}</p>
                    </div>
                    <span class="text-[#555] text-[11px] shrink-0">${date}</span>
                    <button class="opacity-0 group-hover:opacity-100 text-[#666] hover:text-red-500 transition-all p-1 shrink-0" onclick="event.preventDefault(); deleteChat(${i})">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </a>`;
            }).join('');
        }

        function deleteChat(i) {
            project.chats.splice(i, 1);
            saveProjects(projects);
            renderChats();
        }

        // Render sources
        function renderSources() {
            const list = document.getElementById('sources-list');
            const empty = document.getElementById('sources-empty');

            if (project.sources.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.innerHTML = project.sources.map((s, i) => {
                const date = s.createdAt ? new Date(s.createdAt).toLocaleDateString('de-DE', { day: 'numeric', month: 'long', year: 'numeric' }) : '';
                const ext = s.name.split('.').pop().toLowerCase();
                let typeLabel = 'File';
                if (['png','jpg','jpeg','gif','svg','webp'].includes(ext)) typeLabel = 'Image';
                else if (['pdf'].includes(ext)) typeLabel = 'PDF';
                else if (['doc','docx','txt','md'].includes(ext)) typeLabel = 'Document';
                else if (['mp3','wav','ogg'].includes(ext)) typeLabel = 'Audio';
                else if (['mp4','mov','webm'].includes(ext)) typeLabel = 'Video';

                return `
                <div class="flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-[#2a2a2a] transition-colors group">
                    <div class="w-10 h-10 rounded-lg bg-[#1e1e1e] border border-[#2a2a2a] flex items-center justify-center shrink-0">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-white text-[14px] font-medium truncate">${s.name}</p>
                        <p class="text-[#666] text-[12px]">${typeLabel} · ${date}</p>
                    </div>
                    <button class="opacity-0 group-hover:opacity-100 text-[#666] hover:text-red-500 transition-all p-1 shrink-0" onclick="deleteSource(${i})">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>`;
            }).join('');
        }

        function deleteSource(i) {
            project.sources.splice(i, 1);
            saveProjects(projects);
            renderSources();
        }

        // Add sources
        document.getElementById('add-source-btn').addEventListener('click', () => {
            document.getElementById('file-upload').click();
        });
        document.getElementById('file-upload').addEventListener('change', (e) => {
            for (const f of e.target.files) {
                project.sources.push({ name: f.name, size: (f.size / 1024).toFixed(1) + ' KB', createdAt: Date.now() });
            }
            e.target.value = '';
            saveProjects(projects);
            renderSources();
        });

        // Sort dropdown
        let currentSort = 'newest';
        const sortBtn = document.getElementById('sort-btn');
        const sortDropdown = document.getElementById('sort-dropdown');
        const sortLabel = document.getElementById('sort-label');

        sortBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sortDropdown.style.display = sortDropdown.style.display === 'none' ? 'block' : 'none';
        });

        document.addEventListener('click', () => { sortDropdown.style.display = 'none'; });

        document.querySelectorAll('.sort-option').forEach(opt => {
            opt.addEventListener('click', () => {
                currentSort = opt.dataset.sort;
                sortLabel.textContent = opt.textContent;
                sortDropdown.style.display = 'none';

                // Update active style
                document.querySelectorAll('.sort-option').forEach(o => o.style.color = '#888');
                opt.style.color = 'white';

                // Sort sources
                if (currentSort === 'newest') {
                    project.sources.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                } else if (currentSort === 'oldest') {
                    project.sources.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                } else if (currentSort === 'alpha') {
                    project.sources.sort((a, b) => a.name.localeCompare(b.name));
                }

                saveProjects(projects);
                renderSources();
            });
        });

        // Sidebar collapse
        const sidebarEl = document.getElementById('sidebar');
        document.getElementById('sidebar-toggle-btn').addEventListener('click', () => {
            sidebarEl.classList.toggle('sidebar-collapsed');
        });
        sidebarEl.querySelector('.sidebar-logo')?.addEventListener('click', (e) => {
            if (sidebarEl.classList.contains('sidebar-collapsed')) {
                e.preventDefault();
                sidebarEl.classList.remove('sidebar-collapsed');
            }
        });

        // Ellipsis dropdown
        const pvEllipsisBtn = document.getElementById('pv-ellipsis-btn');
        const pvEllipsisDd = document.getElementById('pv-ellipsis-dd');
        pvEllipsisBtn.addEventListener('click', (e) => { e.stopPropagation(); pvEllipsisDd.style.display = pvEllipsisDd.style.display === 'none' ? 'block' : 'none'; pvModelDD.style.display = 'none'; });
        document.addEventListener('click', (e) => { if (!pvEllipsisDd.contains(e.target)) pvEllipsisDd.style.display = 'none'; });

        // Selection toggle
        // Model selector
        const pvModelBtn = document.getElementById('pv-model-btn');
        const pvModelDD = document.getElementById('pv-model-dropdown');
        pvModelBtn.addEventListener('click', (e) => { e.stopPropagation(); pvModelDD.style.display = pvModelDD.style.display === 'none' ? 'block' : 'none'; });
        document.addEventListener('click', () => { pvModelDD.style.display = 'none'; });
        document.querySelectorAll('.pv-model-opt').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('pv-model-label').textContent = btn.dataset.model;
                document.getElementById('pv-model-icon').innerHTML = `<img src="${btn.dataset.icon}" width="16" height="16" />`;
                document.querySelectorAll('.pv-model-opt').forEach(b => { b.classList.remove('bg-[#1a3a5c]'); b.classList.add('hover:bg-[#353535]'); b.querySelector('.pv-check')?.remove(); });
                btn.classList.add('bg-[#1a3a5c]'); btn.classList.remove('hover:bg-[#353535]');
                const chk = document.createElementNS('http://www.w3.org/2000/svg','svg'); chk.setAttribute('width','18'); chk.setAttribute('height','18'); chk.setAttribute('viewBox','0 0 24 24'); chk.setAttribute('fill','none'); chk.setAttribute('stroke','white'); chk.setAttribute('stroke-width','2.5'); chk.classList.add('ml-auto','pv-check'); chk.innerHTML='<polyline points="20 6 9 17 4 12"></polyline>'; btn.appendChild(chk);
                pvModelDD.style.display = 'none';
            });
        });
        const pvModelSearch = document.getElementById('pv-model-search');
        pvModelSearch.addEventListener('input', () => {
            const q = (pvModelSearch.textContent || '').toLowerCase();
            document.querySelectorAll('.pv-model-opt').forEach(b => { b.style.display = b.dataset.model.toLowerCase().includes(q) ? '' : 'none'; });
        });
        pvModelSearch.addEventListener('keydown', (e) => { if (e.key === 'Enter') e.preventDefault(); });
        pvModelSearch.addEventListener('paste', (e) => { e.preventDefault(); document.execCommand('insertText', false, (e.clipboardData || window.clipboardData).getData('text/plain')); });

        // Auth
        const user = getCurrentUser();
        if (user) {
            const sa = document.getElementById('sidebar-auth');
            const name = user.name || user.email.split('@')[0];
            const av = user.picture ? `<img src="${user.picture}" class="w-8 h-8 rounded-full object-cover shrink-0" referrerpolicy="no-referrer" />` : `<div class="w-8 h-8 rounded-full bg-[#333] flex items-center justify-center text-white text-[12px] font-semibold shrink-0">${name[0].toUpperCase()}</div>`;
            sa.innerHTML = `<div class="flex items-center gap-3 px-1 py-1 cursor-pointer hover:bg-[#232323] rounded-lg transition-colors" onclick="logoutUser()">${av}<div class="flex-1 min-w-0"><p class="text-white text-[13px] font-medium truncate">${name}</p><p class="text-[#666] text-[10px]">Free</p></div></div>`;
        }

        // Recording UI
        const pvMicBtn = document.getElementById('pv-mic-btn');
        const pvRecordingUI = document.getElementById('pv-recording-ui');
        const pvPromptContainer = document.getElementById('pv-prompt-container');
        const pvRecordingTimer = document.getElementById('pv-recording-timer');
        const pvRecordingCancel = document.getElementById('pv-recording-cancel');
        const pvRecordingPause = document.getElementById('pv-recording-pause');
        const pvRecordingConfirm = document.getElementById('pv-recording-confirm');
        const pvPauseIcon = document.getElementById('pv-pause-icon');
        const pvPlayIcon = document.getElementById('pv-play-icon');

        let pvRecInterval = null, pvRecSeconds = 0, pvRecPaused = false;
        let pvAudioCtx = null, pvAnalyser = null, pvMicStream = null, pvAnimId = null;

        const pvWaveform = document.getElementById('pv-waveform');
        const pvBarCount = 60;
        const pvBars = [];
        for (let i = 0; i < pvBarCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar';
            bar.style.height = '3px';
            if (i < 6 || i > pvBarCount - 7) { bar.style.background = '#ef4444'; bar.style.opacity = '0.6'; }
            pvWaveform.appendChild(bar);
            pvBars.push(bar);
        }

        function pvFormatTime(t) {
            const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
            return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function pvVisualize() {
            if (!pvAnalyser) return;
            const dataArray = new Uint8Array(pvAnalyser.frequencyBinCount);
            function draw() {
                pvAnimId = requestAnimationFrame(draw);
                if (pvRecPaused) return;
                pvAnalyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                const avg = sum / dataArray.length / 255;
                pvRecordingUI.style.transform = `scale(${1 + avg * 0.02})`;
                const step = Math.floor(dataArray.length / pvBarCount);
                for (let i = 0; i < pvBarCount; i++) {
                    const center = pvBarCount / 2;
                    const dist = Math.abs(i - center) / center;
                    const bell = 1 - dist * dist * 0.6;
                    const idx = Math.min(i * step, dataArray.length - 1);
                    const val = dataArray[idx] / 255;
                    pvBars[i].style.height = Math.max(3, val * bell * 44) + 'px';
                }
            }
            draw();
        }

        async function pvStartRecording() {
            pvRecSeconds = 0; pvRecPaused = false;
            pvRecordingTimer.textContent = pvFormatTime(0);
            pvPauseIcon.classList.remove('hidden'); pvPlayIcon.classList.add('hidden');
            pvPromptContainer.classList.add('hidden');
            pvRecordingUI.classList.remove('hidden'); pvRecordingUI.classList.add('flex');
            try {
                pvMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                pvAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = pvAudioCtx.createMediaStreamSource(pvMicStream);
                pvAnalyser = pvAudioCtx.createAnalyser();
                pvAnalyser.fftSize = 256; pvAnalyser.smoothingTimeConstant = 0.7;
                source.connect(pvAnalyser);
                pvVisualize();
            } catch (err) { console.warn('Microphone access denied'); }
            pvRecInterval = setInterval(() => { if (!pvRecPaused) { pvRecSeconds++; pvRecordingTimer.textContent = pvFormatTime(pvRecSeconds); } }, 1000);
        }

        function pvStopRecording() {
            clearInterval(pvRecInterval); pvRecInterval = null;
            if (pvAnimId) { cancelAnimationFrame(pvAnimId); pvAnimId = null; }
            if (pvMicStream) { pvMicStream.getTracks().forEach(t => t.stop()); pvMicStream = null; }
            if (pvAudioCtx) { pvAudioCtx.close(); pvAudioCtx = null; pvAnalyser = null; }
            pvBars.forEach(b => b.style.height = '3px');
            pvRecordingUI.style.transform = 'scale(1)';
            pvRecordingUI.classList.add('hidden'); pvRecordingUI.classList.remove('flex');
            pvPromptContainer.classList.remove('hidden');
        }

        pvMicBtn.addEventListener('click', pvStartRecording);
        pvRecordingCancel.addEventListener('click', pvStopRecording);
        pvRecordingConfirm.addEventListener('click', pvStopRecording);
        pvRecordingPause.addEventListener('click', () => {
            pvRecPaused = !pvRecPaused;
            if (pvRecPaused) { pvPauseIcon.classList.add('hidden'); pvPlayIcon.classList.remove('hidden'); }
            else { pvPauseIcon.classList.remove('hidden'); pvPlayIcon.classList.add('hidden'); }
        });

        // Toggle handlers for model dropdown
        document.querySelectorAll('.pv-toggle').forEach(toggle => {
            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                const dot = toggle.querySelector('div');
                const isOn = toggle.classList.contains('on');
                if (isOn) {
                    toggle.classList.remove('on', 'bg-[#3b82f6]'); toggle.classList.add('bg-[#4a4a4a]');
                    dot.style.transform = 'translateX(0)'; dot.classList.remove('bg-white'); dot.classList.add('bg-[#888]');
                } else {
                    toggle.classList.add('on', 'bg-[#3b82f6]'); toggle.classList.remove('bg-[#4a4a4a]');
                    dot.style.transform = 'translateX(16px)'; dot.classList.remove('bg-[#888]'); dot.classList.add('bg-white');
                }
            });
        });

        // File attachments
        const pvAttachedFiles = document.getElementById('pv-attached-files');
        const pvAttachedWrapper = document.getElementById('pv-attached-wrapper');
        const pvScrollRight = document.getElementById('pv-scroll-right');
        const pvScrollLeft = document.getElementById('pv-scroll-left');

        function pvUpdateScrollBtns() {
            const el = pvAttachedFiles;
            const canRight = el.scrollLeft + el.clientWidth < el.scrollWidth - 1;
            const canLeft = el.scrollLeft > 0;
            pvScrollRight.classList.toggle('hidden', !canRight);
            pvScrollRight.classList.toggle('flex', canRight);
            pvScrollLeft.classList.toggle('hidden', !canLeft);
            pvScrollLeft.classList.toggle('flex', canLeft);
            if (pvAttachedFiles.children.length === 0) {
                pvAttachedWrapper.classList.add('hidden');
                pvAttachedWrapper.classList.remove('flex');
            }
        }

        pvAttachedFiles.addEventListener('scroll', pvUpdateScrollBtns);

        function pvAddFilePill(name) {
            pvAttachedWrapper.classList.remove('hidden');
            pvAttachedWrapper.classList.add('flex');
            const pill = document.createElement('div');
            pill.className = 'group/file flex items-center bg-[#464646] rounded-full px-3 py-1.5 border border-[#505050] relative shrink-0';
            pill.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2 shrink-0">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <span class="text-[#e2e2e2] text-[14px] font-medium whitespace-nowrap">${name}</span>
                <button class="ml-2 w-[20px] h-[20px] bg-[#5a5a5a] hover:bg-[#666666] rounded-full flex items-center justify-center text-white opacity-0 group-hover/file:opacity-100 transition-opacity cursor-pointer shrink-0">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            `;
            pill.querySelector('button').addEventListener('click', () => { pill.remove(); pvUpdateScrollBtns(); });
            pvAttachedFiles.appendChild(pill);
            setTimeout(pvUpdateScrollBtns, 50);
        }

        document.getElementById('project-file-input').addEventListener('change', (e) => {
            for (const file of e.target.files) pvAddFilePill(file.name);
            e.target.value = '';
        });

        // Drag & drop files
        let pvDragCounter = 0;
        document.addEventListener('dragenter', (e) => {
            if (e.dataTransfer.types.includes('Files')) { pvDragCounter++; }
        });
        document.addEventListener('dragleave', () => { pvDragCounter--; });
        document.addEventListener('dragover', (e) => { if (e.dataTransfer.types.includes('Files')) e.preventDefault(); });
        document.addEventListener('drop', (e) => {
            pvDragCounter = 0;
            if (e.dataTransfer.files.length > 0) {
                e.preventDefault();
                for (const file of e.dataTransfer.files) pvAddFilePill(file.name);
            }
        });

        // Init
        renderChats();
        renderSources();

        // Settings modal
        RetracSettingsModal.inject();

        // Update model selection
        document.querySelectorAll('.pv-model-opt').forEach(btn => {
            btn.addEventListener('click', () => {
                pvCurrentModel = btn.dataset.model;
            });
        });

        // Search Chat
        RetracSearchChat.inject();
        document.getElementById('search-chat-btn')?.addEventListener('click', (e) => {
            e.preventDefault();
            RetracSearchChat.open();
        });
    </script>

<script>
    // Mobile menu
    const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
    const mobileBackdrop = document.getElementById('mobile-backdrop');
    if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', () => {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('mobile-open');
            mobileBackdrop.classList.toggle('active');
        });
        mobileBackdrop?.addEventListener('click', () => {
            const sb = document.getElementById('sidebar');
            sb.classList.remove('mobile-open');
            mobileBackdrop.classList.remove('active');
        });
        document.querySelectorAll('#sidebar nav a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    const sb = document.getElementById('sidebar');
                    sb.classList.remove('mobile-open');
                    mobileBackdrop.classList.remove('active');
                }
            });
        });
    }

</script>
</body>
</html>

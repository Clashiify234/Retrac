<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.png" sizes="any">

    <title>Documents - Retrac</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="js/retrac-api.js"></script>
    <script src="js/settings-modal.js"></script>
    <script src="js/auth-modal.js"></script>
    <script src="js/search-chat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; display: flex; height: 100vh; margin: 0; color: white; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .sidebar-collapsed { width: 54px !important; padding: 12px 8px !important; align-items: center !important; }
        .sidebar-collapsed .sidebar-hide { display: none !important; }
        .sidebar-collapsed .sidebar-header { justify-content: center !important; margin-bottom: 16px !important; }
        .sidebar-collapsed .sidebar-header > *:not(.sidebar-logo) { display: none !important; }
        .sidebar-collapsed nav a { justify-content: center; padding: 8px; }
        .sidebar-collapsed nav a span { display: none; }
        .sidebar-collapsed nav a svg { margin: 0; }
        .sidebar-collapsed #sidebar-auth { align-items: center; }
        .sidebar-collapsed #sidebar-auth button { display: none; }
        .sidebar-collapsed #sidebar-auth > div { justify-content: center; }
        .sidebar-collapsed #sidebar-auth > div > div.flex-1 { display: none; }
        .sidebar-collapsed #sidebar-auth .go-pro-card { display: none; }
        aside#sidebar { transition: width 0.2s ease; }
        #docs-panel { transition: width 0.25s ease, opacity 0.2s ease, padding 0.25s ease; overflow: hidden; }
        #docs-panel.panel-collapsed { width: 0 !important; padding: 0 !important; border: none !important; opacity: 0; }
        #collapsed-toggle { transition: opacity 0.2s ease; }
    </style>
</head>
<body class="antialiased">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-[280px] h-full bg-[#171717] flex flex-col p-4 border-r border-[#2a2a2a] shrink-0">
        <div class="sidebar-header flex items-center justify-between mb-8 px-1 mt-1">
            <a href="index.html" class="sidebar-logo text-white hover:opacity-80 transition-opacity">
                <img src="logo.png" width="32" height="32" alt="Retrac" class="w-8 h-8">
            </a>
            <div class="flex items-center gap-3 sidebar-hide">
                <button class="text-[#a0a0a0] hover:text-white transition-colors"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.3-4.3"></path></svg></button>
                <button id="sidebar-toggle-btn" class="text-[#a0a0a0] bg-[#232323] border border-[#2e2e2e] p-1.5 rounded-lg hover:text-white hover:bg-[#252525] transition-colors"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect><line x1="15" y1="3" x2="15" y2="21"></line></svg></button>
            </div>
        </div>
        <a href="index.html" class="sidebar-hide flex items-center justify-between w-full bg-[#232323] hover:bg-[#252525] border border-[#333333] rounded-full py-2.5 px-4 mb-6 transition-colors">
            <div class="flex items-center gap-3"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-white"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg><span class="font-medium text-[15px] text-[#f0f0f0]">New Chat</span></div>
            <span class="text-[13px] text-[#707070] font-mono tracking-wide">Ctrl O</span>
        </a>
        <nav class="flex flex-col gap-1.5 px-1">
            <a href="apps.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="2"></rect><rect x="14" y="3" width="7" height="7" rx="2"></rect><rect x="14" y="14" width="7" height="7" rx="2"></rect><rect x="3" y="14" width="7" height="7" rx="2"></rect></svg><span class="text-[15px] font-medium">Apps</span></a>
            <a href="imagine.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="15" height="13" rx="2"/><path d="M17 10l5-3v10l-5-3v-4z"/><circle cx="9.5" cy="12.5" r="2.5" stroke-width="1.5"/></svg><span class="text-[15px] font-medium">Imagine</span></a>
            <a href="documents.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg bg-[#232323] text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M 8 22 H 18 A 2 2 0 0 0 20 20 V 4 A 2 2 0 0 0 18 2 H 6 A 2 2 0 0 0 4 4 V 16 L 8 22 Z"></path><path d="M 4 16 H 6 A 2 2 0 0 1 8 18 V 22"></path><line x1="10" y1="10" x2="15" y2="10"></line><line x1="10" y1="14" x2="16" y2="14"></line></svg><span class="text-[15px] font-medium">Documents</span></a>
            <a href="projects.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path><path d="M2 10h20"></path></svg><span class="text-[15px] font-medium">Projects</span></a>
            <a href="presentations.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span class="text-[15px] font-medium">Presentations</span></a>
            <a href="analytics.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="8" width="4" height="13" rx="1"/><rect x="17" y="4" width="4" height="17" rx="1"/></svg><span class="text-[15px] font-medium">Analytics</span></a>
            <a href="finalize.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M3 9h6"/><circle cx="17" cy="7" r="2"/><path d="M14 14l3-3 4 4"/></svg><span class="text-[15px] font-medium">Finalize</span></a>
            <a href="#" id="search-chat-btn" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.3-4.3"></path></svg><span class="text-[15px] font-medium">Search Chat</span></a>
        </nav>
        <div id="chat-history-container" class="sidebar-hide mt-6 px-1 flex-1 overflow-y-auto"></div>
        <div id="sidebar-auth" class="mt-auto flex flex-col gap-3 pt-6 pb-2"></div>
    </aside>

    <!-- Documents Panel -->
    <aside id="docs-panel" class="w-[380px] h-full bg-[#1a1a1a] flex flex-col border-r border-[#2a2a2a] shrink-0">
        <!-- Panel Header -->
        <div class="flex items-center justify-between px-5 pt-5 pb-3">
            <h2 class="text-white text-[18px] font-semibold">Documents</h2>
            <div class="flex items-center gap-2">
                <!-- Collapse panel -->
                <button id="collapse-panel-btn" class="text-[#888] hover:text-white transition-colors p-1">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 17 6 12 11 7"></polyline><polyline points="18 17 13 12 18 7"></polyline></svg>
                </button>
                <!-- Search -->
                <button id="panel-search-btn" class="text-[#888] hover:text-white transition-colors p-1">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.3-4.3"></path></svg>
                </button>
                <!-- Add new -->
                <div class="relative">
                    <button id="add-doc-btn" class="w-[26px] h-[26px] bg-[#555] hover:bg-[#666] rounded-full flex items-center justify-center text-white transition-colors">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <!-- Add dropdown -->
                    <div id="add-doc-dropdown" style="display:none; position:absolute; top:100%; right:0; margin-top:8px; width:200px; background:#2a2a2a; border:1px solid #3e3e3e; border-radius:14px; box-shadow:0 15px 40px rgba(0,0,0,0.5); overflow:hidden; z-index:50;">
                        <button class="add-doc-opt w-full flex items-center gap-3 px-4 py-3 hover:bg-[#353535] transition-colors">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                            <span class="text-white text-[14px]">Document</span>
                        </button>
                        <button class="add-doc-opt w-full flex items-center gap-3 px-4 py-3 hover:bg-[#353535] transition-colors">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><text x="7" y="16" font-size="7" fill="#9ca3af" font-family="Inter" font-weight="600">PDF</text></svg>
                            <span class="text-white text-[14px]">Ask PDF</span>
                        </button>
                        <button class="add-doc-opt w-full flex items-center justify-between px-4 py-3 hover:bg-[#353535] transition-colors">
                            <div class="flex items-center gap-3">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                                <span class="text-white text-[14px]">Code</span>
                            </div>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </button>
                        <button class="add-doc-opt w-full flex items-center gap-3 px-4 py-3 hover:bg-[#353535] transition-colors">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path></svg>
                            <span class="text-white text-[14px]">Upload Files</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search bar (hidden by default) -->
        <div id="panel-search-bar" style="display:none;" class="px-4 pb-3">
            <div class="flex items-center gap-2 bg-[#2a2a2a] border border-[#3a3a3a] rounded-full px-3 py-2">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.3-4.3"></path></svg>
                <input id="panel-search-input" type="text" placeholder="Search documents" class="flex-1 bg-transparent text-white text-[13px] outline-none placeholder-[#666]" />
            </div>
        </div>

        <!-- Filter & Sort -->
        <div class="flex items-center gap-2 px-5 pb-3">
            <div class="relative">
                <button id="filter-btn" class="flex items-center gap-1.5 px-3 py-1.5 border border-[#3a3a3a] rounded-full text-[#ccc] text-[13px] hover:bg-[#2a2a2a] transition-colors">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="7" y1="12" x2="17" y2="12"></line><line x1="10" y1="18" x2="14" y2="18"></line></svg>
                    Filter
                </button>
                <div id="filter-dropdown" style="display:none; position:absolute; top:100%; left:0; margin-top:6px; width:150px; background:#2a2a2a; border:1px solid #3a3a3a; border-radius:14px; padding:6px; box-shadow:0 12px 40px rgba(0,0,0,0.6); z-index:50;">
                    <button class="filter-opt w-full flex items-center justify-between px-4 py-2.5 text-[14px] font-medium rounded-lg hover:bg-[#333] transition-colors text-white" data-filter="all">All</button>
                    <button class="filter-opt w-full flex items-center justify-between px-4 py-2.5 text-[14px] font-medium rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-filter="documents">Documents</button>
                    <button class="filter-opt w-full flex items-center justify-between px-4 py-2.5 text-[14px] font-medium rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-filter="code">Code</button>
                    <button class="filter-opt w-full flex items-center justify-between px-4 py-2.5 text-[14px] font-medium rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-filter="pdf">PDF</button>
                </div>
            </div>
            <div class="relative">
                <button id="sort-btn" class="flex items-center gap-1.5 px-3 py-1.5 border border-[#3a3a3a] rounded-full text-[#ccc] text-[13px] hover:bg-[#2a2a2a] transition-colors">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5h10"></path><path d="M11 9h7"></path><path d="M11 13h4"></path><path d="M3 17l3 3 3-3"></path><path d="M6 18V4"></path></svg>
                    Sort
                </button>
                <div id="sort-dropdown" style="display:none; position:absolute; top:100%; left:0; margin-top:6px; width:170px; background:#2a2a2a; border:1px solid #3a3a3a; border-radius:14px; padding:6px; box-shadow:0 12px 40px rgba(0,0,0,0.6); z-index:50;">
                    <button class="sort-opt w-full flex items-center justify-between px-4 py-2.5 text-[14px] font-medium rounded-lg hover:bg-[#333] transition-colors text-white" data-sort="all">All</button>
                    <button class="sort-opt w-full flex items-center justify-between px-4 py-2.5 text-[14px] font-medium rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-sort="name">Name</button>
                    <button class="sort-opt w-full flex items-center justify-between px-4 py-2.5 text-[14px] font-medium rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-sort="creation">Creation Time</button>
                    <button class="sort-opt w-full flex items-center justify-between px-4 py-2.5 text-[14px] font-medium rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-sort="lastused">Last Used Time</button>
                </div>
            </div>
        </div>

        <!-- Documents list -->
        <div id="docs-list" class="flex-1 overflow-y-auto px-4">
        </div>

        <!-- Empty state -->
        <div id="docs-empty" class="flex-1 flex flex-col items-center justify-center px-6 text-center">
            <p class="text-[#888] text-[14px] font-medium mb-1">No Documents</p>
            <p class="text-[#555] text-[12px] leading-relaxed">Upload a document or ask the chatbot to create one.</p>
        </div>
    </aside>

    <!-- Collapsed panel toggle (hidden by default) -->
    <div id="collapsed-toggle" style="display:none;" class="h-full bg-[#1a1a1a] border-r border-[#2a2a2a] flex items-start pt-5 px-2 shrink-0">
        <button id="expand-panel-btn" class="text-[#888] hover:text-white transition-colors p-1">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"></polyline><polyline points="6 17 11 12 6 7"></polyline></svg>
        </button>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col bg-[#252525] overflow-hidden">
        <div class="flex-1 flex flex-col items-center justify-center px-6">
            <!-- Retrac icon -->
            <div class="mb-4">
<img src="logo.png" width="96" height="96" alt="Retrac" class="w-24 h-24">
            </div>
            <h2 class="text-white text-[20px] font-semibold mb-6">Create something new</h2>

            <!-- 2x2 Card Grid -->
            <div class="grid grid-cols-2 gap-3 w-full max-w-[520px]">
                <!-- Document -->
                <button class="create-card flex items-start gap-3 p-5 bg-[#2f2f2f] border border-[#3a3a3a] rounded-2xl text-left hover:bg-[#333] hover:border-[#4a4a4a] transition-colors">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" class="shrink-0 mt-0.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                    <div>
                        <p class="text-white text-[14px] font-semibold mb-0.5">Document</p>
                        <p class="text-[#888] text-[12px] leading-relaxed">Summarize, rewrite, and chat about your...</p>
                    </div>
                </button>
                <!-- Ask PDF -->
                <button class="create-card flex items-start gap-3 p-5 bg-[#2f2f2f] border border-[#3a3a3a] rounded-2xl text-left hover:bg-[#333] hover:border-[#4a4a4a] transition-colors">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" class="shrink-0 mt-0.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><text x="7" y="16" font-size="7" fill="#9ca3af" font-family="Inter" font-weight="600">PDF</text></svg>
                    <div>
                        <p class="text-white text-[14px] font-semibold mb-0.5">Ask PDF</p>
                        <p class="text-[#888] text-[12px] leading-relaxed">Upload a PDF and ask anything about it.</p>
                    </div>
                </button>
                <!-- Code -->
                <button class="create-card flex items-start gap-3 p-5 bg-[#2f2f2f] border border-[#3a3a3a] rounded-2xl text-left hover:bg-[#333] hover:border-[#4a4a4a] transition-colors">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" class="shrink-0 mt-0.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><polyline points="10 12 8 14 10 16"></polyline><polyline points="14 12 16 14 14 16"></polyline></svg>
                    <div>
                        <p class="text-white text-[14px] font-semibold mb-0.5">Code</p>
                        <p class="text-[#888] text-[12px] leading-relaxed">Debug, explain, and improve your code.</p>
                    </div>
                </button>
                <!-- Upload Files -->
                <button class="create-card flex items-start gap-3 p-5 bg-[#2f2f2f] border border-[#3a3a3a] rounded-2xl text-left hover:bg-[#333] hover:border-[#4a4a4a] transition-colors">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" class="shrink-0 mt-0.5"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path></svg>
                    <div>
                        <p class="text-white text-[14px] font-semibold mb-0.5">Upload Files</p>
                        <p class="text-[#888] text-[12px] leading-relaxed">Upload files to start chatting.</p>
                    </div>
                </button>
            </div>
        </div>
    </main>

    <script>
        // Auth provided by auth-modal.js

        // ========== Sidebar Collapse ==========
        const sidebarEl = document.getElementById('sidebar');
        document.getElementById('sidebar-toggle-btn').addEventListener('click', () => {
            sidebarEl.classList.toggle('sidebar-collapsed');
        });
        sidebarEl.querySelector('.sidebar-logo')?.addEventListener('click', (e) => {
            if (sidebarEl.classList.contains('sidebar-collapsed')) {
                e.preventDefault();
                sidebarEl.classList.remove('sidebar-collapsed');
            }
        });

        // ========== Panel Collapse/Expand ==========
        const docsPanel = document.getElementById('docs-panel');
        const collapsedToggle = document.getElementById('collapsed-toggle');

        document.getElementById('collapse-panel-btn').addEventListener('click', () => {
            docsPanel.classList.add('panel-collapsed');
            setTimeout(() => { collapsedToggle.style.display = 'flex'; }, 250);
        });
        document.getElementById('expand-panel-btn').addEventListener('click', () => {
            collapsedToggle.style.display = 'none';
            docsPanel.classList.remove('panel-collapsed');
        });

        // ========== Search toggle ==========
        const panelSearchBar = document.getElementById('panel-search-bar');
        document.getElementById('panel-search-btn').addEventListener('click', () => {
            const visible = panelSearchBar.style.display !== 'none';
            panelSearchBar.style.display = visible ? 'none' : 'block';
            if (!visible) document.getElementById('panel-search-input').focus();
        });

        // ========== Filter Dropdown ==========
        const filterBtn = document.getElementById('filter-btn');
        const filterDD = document.getElementById('filter-dropdown');
        const checkSvg = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" class="dd-check shrink-0"><polyline points="20 6 9 17 4 12"></polyline></svg>';

        filterBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            filterDD.style.display = filterDD.style.display === 'none' ? 'block' : 'none';
            sortDD.style.display = 'none';
        });
        document.querySelectorAll('.filter-opt').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-opt').forEach(b => {
                    b.classList.remove('text-white'); b.classList.add('text-[#888]');
                    b.querySelector('.dd-check')?.remove();
                });
                btn.classList.remove('text-[#888]'); btn.classList.add('text-white');
                btn.insertAdjacentHTML('beforeend', checkSvg);
                filterDD.style.display = 'none';
                // Update button text
                const label = btn.dataset.filter === 'all' ? 'Filter' : btn.textContent.trim();
                filterBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="7" y1="12" x2="17" y2="12"></line><line x1="10" y1="18" x2="14" y2="18"></line></svg>${label}`;
            });
        });

        // ========== Sort Dropdown ==========
        const sortBtn = document.getElementById('sort-btn');
        const sortDD = document.getElementById('sort-dropdown');
        sortBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sortDD.style.display = sortDD.style.display === 'none' ? 'block' : 'none';
            filterDD.style.display = 'none';
        });
        document.querySelectorAll('.sort-opt').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sort-opt').forEach(b => {
                    b.classList.remove('text-white'); b.classList.add('text-[#888]');
                    b.querySelector('.dd-check')?.remove();
                });
                btn.classList.remove('text-[#888]'); btn.classList.add('text-white');
                btn.insertAdjacentHTML('beforeend', checkSvg);
                sortDD.style.display = 'none';
                // Update button text
                const label = btn.dataset.sort === 'all' ? 'Sort' : btn.textContent.trim();
                sortBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5h10"></path><path d="M11 9h7"></path><path d="M11 13h4"></path><path d="M3 17l3 3 3-3"></path><path d="M6 18V4"></path></svg>${label}`;
            });
        });

        // ========== Add Document Dropdown ==========
        const addDocBtn = document.getElementById('add-doc-btn');
        const addDocDD = document.getElementById('add-doc-dropdown');
        addDocBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            addDocDD.style.display = addDocDD.style.display === 'none' ? 'block' : 'none';
        });

        // Close all dropdowns on outside click
        document.addEventListener('click', () => {
            filterDD.style.display = 'none';
            sortDD.style.display = 'none';
            addDocDD.style.display = 'none';
        });

        // Prevent dropdown close when clicking inside
        [filterDD, sortDD, addDocDD].forEach(dd => {
            dd.addEventListener('click', (e) => e.stopPropagation());
        });

        // ========== Document Management ==========
        let documents = JSON.parse(localStorage.getItem('retrac_documents') || '[]');
        let currentFilter = 'all';
        let currentSort = 'all';

        function saveDocs() { localStorage.setItem('retrac_documents', JSON.stringify(documents)); }

        function renderDocs() {
            const list = document.getElementById('docs-list');
            const empty = document.getElementById('docs-empty');

            let filtered = [...documents];
            if (currentFilter !== 'all') {
                filtered = filtered.filter(d => d.type === currentFilter);
            }
            if (currentSort === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name));
            else if (currentSort === 'creation') filtered.sort((a, b) => b.createdAt - a.createdAt);
            else if (currentSort === 'lastused') filtered.sort((a, b) => (b.lastUsed || b.createdAt) - (a.lastUsed || a.createdAt));

            if (filtered.length === 0) {
                list.innerHTML = '';
                list.style.display = 'none';
                empty.style.display = 'flex';
                return;
            }

            empty.style.display = 'none';
            list.style.display = 'block';
            list.innerHTML = filtered.map((d, i) => {
                const icon = d.type === 'code' ? '<polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline>' :
                             d.type === 'pdf' ? '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline>' :
                             '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline>';
                const date = new Date(d.createdAt).toLocaleDateString('de-DE', { day: 'numeric', month: 'short' });
                const typeLabel = d.type === 'code' ? 'Code' : d.type === 'pdf' ? 'PDF' : 'Document';
                return `
                <div class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-[#2a2a2a] transition-colors cursor-pointer group" data-idx="${i}">
                    <div class="w-8 h-8 rounded-lg bg-[#252525] border border-[#333] flex items-center justify-center shrink-0">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8">${icon}</svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-white text-[13px] font-medium truncate">${d.name}</p>
                        <p class="text-[#555] text-[11px]">${typeLabel} · ${date}</p>
                    </div>
                    <button class="opacity-0 group-hover:opacity-100 text-[#666] hover:text-red-500 transition-all p-1 shrink-0 delete-doc" data-idx="${i}">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>`;
            }).join('');

            list.querySelectorAll('.delete-doc').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    documents.splice(idx, 1);
                    saveDocs();
                    renderDocs();
                });
            });
        }

        // Create document popup (custom styled, not browser default)
        function showCreateDocPopup(type) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:20000;display:flex;align-items:center;justify-content:center;';
            const typeLabel = type === 'code' ? 'Code File' : type === 'pdf' ? 'PDF Analysis' : 'Document';
            const placeholder = type === 'code' ? 'script.js' : type === 'pdf' ? 'Upload a PDF...' : 'My Document';
            overlay.innerHTML = `
                <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:24px;width:400px;box-shadow:0 20px 50px rgba(0,0,0,0.5);">
                    <p style="color:white;font-size:16px;font-weight:600;margin-bottom:16px;">New ${typeLabel}</p>
                    ${type === 'pdf' ? '<input type="file" accept=".pdf" class="doc-file-input" style="display:none;" />' : ''}
                    <input type="text" class="doc-name-input" placeholder="${placeholder}" style="width:100%;background:#0e0e0e;border:1px solid #2a2a2a;border-radius:10px;padding:10px 14px;color:white;font-size:14px;outline:none;margin-bottom:16px;box-sizing:border-box;" />
                    ${type === 'pdf' ? '<button class="pick-file" style="width:100%;background:#2a2a2a;color:#ccc;border:none;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;margin-bottom:16px;">Choose PDF File</button>' : ''}
                    <div style="display:flex;gap:10px;justify-content:flex-end;">
                        <button class="cancel-btn" style="background:#2a2a2a;color:white;border:none;border-radius:10px;padding:8px 20px;font-size:13px;cursor:pointer;">Cancel</button>
                        <button class="create-btn" style="background:#2D8CFF;color:white;border:none;border-radius:10px;padding:8px 20px;font-size:13px;cursor:pointer;">Create</button>
                    </div>
                </div>
            `;
            overlay.querySelector('.cancel-btn').addEventListener('click', () => overlay.remove());
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
            overlay.querySelector('.pick-file')?.addEventListener('click', () => {
                overlay.querySelector('.doc-file-input')?.click();
            });
            overlay.querySelector('.doc-file-input')?.addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    overlay.querySelector('.doc-name-input').value = e.target.files[0].name;
                }
            });
            overlay.querySelector('.create-btn').addEventListener('click', () => {
                const name = overlay.querySelector('.doc-name-input').value.trim();
                if (!name) return;
                documents.unshift({ name, type: type === 'pdf' ? 'pdf' : type === 'code' ? 'code' : 'documents', content: '', createdAt: Date.now(), lastUsed: Date.now() });
                saveDocs();
                renderDocs();
                overlay.remove();
            });
            overlay.querySelector('.doc-name-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') overlay.querySelector('.create-btn').click();
                if (e.key === 'Escape') overlay.remove();
            });
            document.body.appendChild(overlay);
            overlay.querySelector('.doc-name-input').focus();
        }

        // Upload files popup
        function showUploadPopup() {
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;
            input.addEventListener('change', (e) => {
                for (const f of e.target.files) {
                    const ext = f.name.split('.').pop().toLowerCase();
                    let type = 'documents';
                    if (['js','ts','py','html','css','json','java','cpp','c','go','rs','rb','php','sh','yaml','yml','xml','sql'].includes(ext)) type = 'code';
                    else if (ext === 'pdf') type = 'pdf';
                    documents.unshift({ name: f.name, type, content: '', createdAt: Date.now(), lastUsed: Date.now(), size: f.size });
                    saveDocs();
                }
                renderDocs();
            });
            input.click();
        }

        // Wire up add document dropdown options
        document.querySelectorAll('.add-doc-opt').forEach((btn, i) => {
            btn.addEventListener('click', () => {
                addDocDD.style.display = 'none';
                if (i === 0) showCreateDocPopup('document');
                else if (i === 1) showCreateDocPopup('pdf');
                else if (i === 2) showCreateDocPopup('code');
                else if (i === 3) showUploadPopup();
            });
        });

        // Wire up create cards in main area
        document.querySelectorAll('.create-card').forEach((card, i) => {
            card.addEventListener('click', () => {
                if (i === 0) showCreateDocPopup('document');
                else if (i === 1) showCreateDocPopup('pdf');
                else if (i === 2) showCreateDocPopup('code');
                else if (i === 3) showUploadPopup();
            });
        });

        // Filter functionality
        document.querySelectorAll('.filter-opt').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.dataset.filter;
                renderDocs();
            });
        });

        // Sort functionality
        document.querySelectorAll('.sort-opt').forEach(btn => {
            btn.addEventListener('click', () => {
                currentSort = btn.dataset.sort;
                renderDocs();
            });
        });

        // Search
        document.getElementById('panel-search-input')?.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('#docs-list > div').forEach(el => {
                const name = el.querySelector('.text-white')?.textContent.toLowerCase() || '';
                el.style.display = name.includes(q) ? '' : 'none';
            });
        });

        renderDocs();

        // Inject settings modal
        RetracSettingsModal.inject();

        // ========== Auth ==========
        const user = getCurrentUser();
        if (user) {
            const sa = document.getElementById('sidebar-auth');
            const name = user.name || user.email.split('@')[0];
            const av = user.picture
                ? `<img src="${user.picture}" class="w-9 h-9 rounded-full object-cover shrink-0" referrerpolicy="no-referrer" />`
                : `<div class="w-9 h-9 rounded-full bg-[#333] flex items-center justify-center text-white text-[14px] font-semibold shrink-0">${name[0].toUpperCase()}</div>`;
            sa.innerHTML = `
                <div class="bg-[#2D8CFF] rounded-2xl p-4 flex items-center justify-between mb-3 cursor-pointer hover:brightness-110 transition">
                    <div class="flex items-center gap-3">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="white" stroke="none"><path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2z"></path></svg>
                        <div><p class="text-white text-[13px] font-semibold">Go Pro</p><p class="text-white/70 text-[10px]">Upgrade your plan</p></div>
                    </div>
                    <span class="bg-white text-black text-[11px] font-semibold px-3 py-1 rounded-full">Upgrade</span>
                </div>
                <div class="flex items-center gap-3 px-1 py-1 cursor-pointer hover:bg-[#232323] rounded-lg transition-colors" onclick="logoutUser()">
                    ${av}
                    <div class="flex-1 min-w-0"><p class="text-white text-[13px] font-medium truncate">${name}</p><p class="text-[#666] text-[10px]">Free</p></div>
                </div>`;
        }

        // Search Chat
        RetracSearchChat.inject();
        document.getElementById('search-chat-btn')?.addEventListener('click', (e) => {
            e.preventDefault();
            RetracSearchChat.open();
        });
    </script>
</body>
</html>

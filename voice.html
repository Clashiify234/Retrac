        `;

        document.getElementById('profile-btn')?.addEventListener('click', (e) => {
            e.stopPropagation();
            const dd = document.getElementById('profile-dropdown');
            dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
        });
        document.addEventListener('click', (e) => {
            const dd = document.getElementById('profile-dropdown');
            if (dd && !dd.contains(e.target)) dd.style.display = 'none';
        });
        document.getElementById('logout-btn')?.addEventListener('click', logoutUser);
    }

    // Auto-login on page load
    const savedUser = getCurrentUser();
    if (savedUser) showLoggedInUI(savedUser);

    // Render sidebar chat history
    renderSidebarChatHistory();

    // ============ Google Sign-In ============
    const GOOGLE_CLIENT_ID = '1002474250480-t1937sr0esof50t8e0ai9gbipgku672j.apps.googleusercontent.com';

    function handleGoogleCredential(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        const email = payload.email;
        const name = payload.name || email.split('@')[0];
        const picture = payload.picture || null;
        const users = getUsers();
        if (!users[email]) {
            users[email] = { email, name, picture, provider: 'google', createdAt: Date.now() };
            saveUsers(users);
        }
        setCurrentUser({ email, name, picture, provider: 'google' });
        closeGhostPopup();
        showLoggedInUI({ email, name, picture, provider: 'google' });
    }

    let googleInitialized = false;
    window.addEventListener('load', () => {
        if (window.google?.accounts?.id) {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleGoogleCredential,
                ux_mode: 'popup',
                context: 'signin'
            });
            googleInitialized = true;
        }
    });

    function createGoogleTokenClient() {
        return google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: 'email profile',
            callback: async (tokenResponse) => {
                if (tokenResponse.access_token) {
                    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                        headers: { Authorization: 'Bearer ' + tokenResponse.access_token }
                    });
                    const payload = await res.json();
                    const email = payload.email;
                    const name = payload.name || email.split('@')[0];
                    const picture = payload.picture || null;
                    const users = getUsers();
                    if (!users[email]) {
                        users[email] = { email, name, picture, provider: 'google', createdAt: Date.now() };
                        saveUsers(users);
                    }
                    setCurrentUser({ email, name, picture, provider: 'google' });
                    closeGhostPopup();
                    showLoggedInUI({ email, name, picture, provider: 'google' });
                }
            }
        });
    }

    document.getElementById('google-login-btn')?.addEventListener('click', () => {
        if (googleInitialized && window.google?.accounts?.id) {
            google.accounts.id.prompt((notification) => {
                if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                    if (window.google?.accounts?.oauth2) {
                        createGoogleTokenClient().requestAccessToken();
                    }
                }
            });
        } else if (window.google?.accounts?.oauth2) {
            createGoogleTokenClient().requestAccessToken();
        }
    });

    // Apple login placeholder
    document.getElementById('apple-login-btn')?.addEventListener('click', () => {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:20000;display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = '<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:24px;width:400px;box-shadow:0 20px 50px rgba(0,0,0,0.5);"><p style="color:white;font-size:15px;margin-bottom:6px;font-weight:600;">Apple Sign-In</p><p style="color:#888;font-size:13px;margin-bottom:20px;">Apple Sign-In is currently unavailable. Please use Google or Email login instead.</p><div style="display:flex;justify-content:flex-end;"><button class="close-btn" style="background:#2a2a2a;color:white;border:none;border-radius:10px;padding:8px 20px;font-size:13px;cursor:pointer;">OK</button></div></div>';
        overlay.querySelector('.close-btn').addEventListener('click', () => overlay.remove());
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        document.body.appendChild(overlay);
    });
</script>

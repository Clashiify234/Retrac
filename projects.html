<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="black-logo.png" media="(prefers-color-scheme: light)">
    <title>Projects - Retrac</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="js/retrac-api.js"></script>
    <script src="js/settings-modal.js"></script>
    <script src="js/auth-modal.js"></script>
    <script src="js/search-chat.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            display: flex;
            height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .sidebar-collapsed { width: 54px !important; padding: 12px 8px !important; align-items: center !important; }
        .sidebar-collapsed .sidebar-hide { display: none !important; }
        .sidebar-collapsed .sidebar-header { justify-content: center !important; margin-bottom: 16px !important; }
        .sidebar-collapsed .sidebar-header > *:not(.sidebar-logo) { display: none !important; }
        .sidebar-collapsed nav a { justify-content: center; padding: 8px; }
        .sidebar-collapsed nav a span { display: none; }
        .sidebar-collapsed nav a svg { margin: 0; }
        .sidebar-collapsed #sidebar-auth { align-items: center; }
        .sidebar-collapsed #sidebar-auth button { display: none; }
        .sidebar-collapsed #sidebar-auth > div { justify-content: center; }
        .sidebar-collapsed #sidebar-auth > div > div.flex-1 { display: none; }
        .sidebar-collapsed #sidebar-auth .go-pro-card { display: none; }
        aside { transition: width 0.2s ease; }
    </style>
</head>
<body class="antialiased">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-[280px] h-full bg-[#171717] flex flex-col p-4 border-r border-[#2a2a2a] shrink-0">

        <!-- Sidebar Header -->
        <div class="sidebar-header flex items-center justify-between mb-8 px-1 mt-1">
            <a href="index.html" class="sidebar-logo text-white hover:opacity-80 transition-opacity">
<img src="logo.png" width="32" height="32" alt="Retrac" class="w-8 h-8">
            </a>
            <div class="flex items-center gap-3 sidebar-hide">
                <button class="text-[#a0a0a0] hover:text-white transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.3-4.3"></path>
                    </svg>
                </button>
                <button id="sidebar-toggle-btn" class="text-[#a0a0a0] bg-[#232323] border border-[#2e2e2e] p-1.5 rounded-lg hover:text-white hover:bg-[#252525] transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect>
                        <line x1="15" y1="3" x2="15" y2="21"></line>
                    </svg>
                </button>
            </div>
        </div>

        <!-- New Chat Button -->
        <a href="index.html" class="sidebar-hide flex items-center justify-between w-full bg-[#232323] hover:bg-[#252525] border border-[#333333] rounded-full py-2.5 px-4 mb-6 transition-colors group">
            <div class="flex items-center gap-3">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                <span class="font-medium text-[15px] text-[#f0f0f0]">New Chat</span>
            </div>
            <span class="text-[13px] text-[#707070] font-mono tracking-wide">Ctrl O</span>
        </a>

        <!-- Navigation -->
        <nav class="flex flex-col gap-1.5 px-1">
            <a href="apps.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="2"></rect><rect x="14" y="3" width="7" height="7" rx="2"></rect><rect x="14" y="14" width="7" height="7" rx="2"></rect><rect x="3" y="14" width="7" height="7" rx="2"></rect></svg><span class="text-[15px] font-medium">Apps</span></a>
            <a href="imagine.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="15" height="13" rx="2"/><path d="M17 10l5-3v10l-5-3v-4z"/><circle cx="9.5" cy="12.5" r="2.5" stroke-width="1.5"/></svg>
                <span class="text-[15px] font-medium">Imagine</span>
            </a>
            <a href="documents.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M 8 22 H 18 A 2 2 0 0 0 20 20 V 4 A 2 2 0 0 0 18 2 H 6 A 2 2 0 0 0 4 4 V 16 L 8 22 Z"></path>
                    <path d="M 4 16 H 6 A 2 2 0 0 1 8 18 V 22"></path>
                    <line x1="10" y1="10" x2="15" y2="10"></line><line x1="10" y1="14" x2="16" y2="14"></line>
                </svg>
                <span class="text-[15px] font-medium">Documents</span>
            </a>
            <a href="projects.html" class="flex items-center gap-3.5 py-2 px-3 rounded-lg bg-[#232323] text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path>
                    <path d="M2 10h20"></path>
                </svg>
                <span class="text-[15px] font-medium">Projects</span>
            </a>
            <a href="#" id="search-chat-btn" class="flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.3-4.3"></path>
                </svg>
                <span class="text-[15px] font-medium">Search Chat</span>
            </a>
        </nav>

        <!-- Chat History -->
        <div id="chat-history-container" class="sidebar-hide mt-6 px-1 flex-1 overflow-y-auto"></div>

        <!-- Auth Bottom -->
        <div id="sidebar-auth" class="mt-auto flex flex-col gap-3 pt-6 pb-2">
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col bg-[#252525] relative">

        <!-- Top Navbar -->
        <header class="h-14 flex items-center justify-between px-4 border-b border-[#2a2a2a] bg-[#252525] shrink-0">
            <div></div>
            <div class="flex items-center gap-2">
                <button id="settings-btn" class="p-2 text-[#8e8e8e] hover:text-white rounded-lg transition-colors" title="Settings & API Keys">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Projects Content -->
        <div class="flex-1 flex flex-col overflow-y-auto">

            <!-- Empty State (shown when no projects) -->
            <div id="empty-state" class="flex-1 flex flex-col items-center justify-center px-6">
                <div class="mb-4">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path>
                        <path d="M2 10h20"></path>
                    </svg>
                </div>
                <h2 class="text-white text-[20px] font-semibold mb-2">Looking to start a project?</h2>
                <p class="text-[#888] text-[14px] text-center max-w-md mb-6 leading-relaxed">
                    Upload materials, set custom instructions, and organize conversations in one place.
                </p>
                <button id="create-project-btn-empty" class="flex items-center gap-2 px-5 py-2.5 bg-white text-black text-[14px] font-medium rounded-full hover:bg-gray-200 transition-colors">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Create Project
                </button>
            </div>

            <!-- Projects View (shown when projects exist) -->
            <div id="projects-view" class="hidden flex flex-col items-center px-8 py-8" style="min-height:0;">
                <!-- Projects Grid -->
                <div id="projects-grid" class="w-full max-w-5xl grid grid-cols-3 gap-4" style="flex:0 0 auto;">
                </div>

                <!-- Create Button below grid -->
                <div class="mt-6">
                    <button id="create-project-btn" class="flex items-center gap-2 px-5 py-2.5 bg-white text-black text-[14px] font-medium rounded-full hover:bg-gray-200 transition-colors">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Create Project
                    </button>
                </div>
            </div>

        </div>

    </main>

    <!-- Create Project Popup -->
    <div id="create-project-backdrop" style="display:none; position:fixed; top:0; left:280px; right:0; bottom:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:9998;"></div>
    <div id="create-project-popup" style="display:none; position:fixed; top:50%; left:calc(280px + (100vw - 280px) / 2); transform:translate(-50%,-50%); z-index:9999; width:420px; background:#0e0e0e; border:1px solid #222; border-radius:24px; padding:32px; box-shadow:0 25px 50px rgba(0,0,0,0.5);">
        <button id="create-project-close" style="position:absolute; top:16px; right:16px; background:none; border:none; cursor:pointer; color:#888;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <h3 style="margin:0 0 6px; font-family:inherit; font-size:18px; font-weight:600; color:white;">New Project</h3>
        <p style="margin:0 0 20px; font-size:13px; color:#888;">Give your project a name to get started.</p>
        <input id="project-name-input" type="text" placeholder="Project name" style="width:100%; background:#1e1e1e; border:1px solid #333; color:white; border-radius:12px; padding:12px 16px; font-size:14px; outline:none; font-family:inherit; box-sizing:border-box; margin-bottom:20px;" />
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button id="create-project-cancel" style="padding:10px 20px; background:transparent; border:1px solid #333; border-radius:10px; color:#888; font-size:13px; cursor:pointer; font-family:inherit;">Cancel</button>
            <button id="create-project-confirm" style="padding:10px 24px; background:white; border:none; border-radius:10px; color:black; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;">Create</button>
        </div>
    </div>

    <script>
        // ========== Sidebar Collapse ==========
        const sidebarEl = document.getElementById('sidebar');
        document.getElementById('sidebar-toggle-btn').addEventListener('click', () => {
            sidebarEl.classList.toggle('sidebar-collapsed');
        });
        sidebarEl.querySelector('.sidebar-logo')?.addEventListener('click', (e) => {
            if (sidebarEl.classList.contains('sidebar-collapsed')) {
                e.preventDefault();
                sidebarEl.classList.remove('sidebar-collapsed');
            }
        });

        // Auth provided by auth-modal.js

        // ========== Projects Storage ==========
        function getProjects() {
            const user = getCurrentUser();
            if (!user) return [];
            return JSON.parse(localStorage.getItem('retrac_projects_' + user.email) || '[]');
        }
        function saveProjects(projects) {
            const user = getCurrentUser();
            if (!user) return;
            localStorage.setItem('retrac_projects_' + user.email, JSON.stringify(projects));
        }

        // ========== Show Logged-In UI ==========
        function showLoggedInUI(user) {
            const sidebarAuth = document.getElementById('sidebar-auth');
            if (!sidebarAuth) return;
            const userEmail = user.email;
            const userName = user.name || userEmail.split('@')[0];
            const initial = userName[0].toUpperCase();
            const avatarHTML = user.picture
                ? `<img src="${user.picture}" class="w-9 h-9 rounded-full object-cover shrink-0" referrerpolicy="no-referrer" />`
                : `<div class="w-9 h-9 rounded-full bg-[#333] flex items-center justify-center text-white text-[14px] font-semibold shrink-0">${initial}</div>`;

            sidebarAuth.innerHTML = `
                <div class="bg-[#2D8CFF] rounded-2xl p-4 flex items-center justify-between mb-3 cursor-pointer hover:brightness-110 transition">
                    <div class="flex items-center gap-3">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="white" stroke="none">
                            <path d="M12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21L12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.63L12 2Z"/>
                        </svg>
                        <div>
                            <p class="text-white text-[14px] font-bold leading-tight">Go Pro</p>
                            <p class="text-white/70 text-[11px]">Upgrade your plan</p>
                        </div>
                    </div>
                    <div class="bg-white text-[#2D8CFF] text-[12px] font-semibold px-4 py-1.5 rounded-full">Upgrade</div>
                </div>
                <div style="height:1px; background:#2a2a2a; margin:4px 0;"></div>
                <div class="relative">
                    <div id="profile-btn" class="flex items-center gap-3 px-1 py-2 cursor-pointer hover:bg-[#232323] rounded-lg transition-colors">
                        ${avatarHTML}
                        <div class="flex-1 min-w-0">
                            <p class="text-white text-[14px] font-medium truncate">${userName}</p>
                            <p class="text-[#666] text-[11px]">Free</p>
                        </div>
                    </div>
                    <div id="profile-dropdown" style="display:none; position:absolute; bottom:100%; left:0; right:0; margin-bottom:8px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:16px; padding:8px 0; box-shadow:0 15px 40px rgba(0,0,0,0.5); z-index:100;">
                        <div class="flex items-center gap-3 px-4 py-3"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span class="text-[#888] text-[14px]">${userEmail}</span></div>
                        <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-[#232323] transition-colors"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg><span class="text-white text-[14px]">Settings</span></a>
                        <div style="height:1px; background:#2a2a2a; margin:4px 0;"></div>
                        <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-[#232323] transition-colors text-left"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg><span class="text-red-500 text-[14px]">Log Out</span></button>
                    </div>
                </div>
            `;

            document.getElementById('profile-btn')?.addEventListener('click', (e) => {
                e.stopPropagation();
                const dd = document.getElementById('profile-dropdown');
                dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
            });
            document.addEventListener('click', (e) => {
                const dd = document.getElementById('profile-dropdown');
                if (dd && !dd.contains(e.target)) dd.style.display = 'none';
            });
            document.getElementById('logout-btn')?.addEventListener('click', logoutUser);
        }

        // Auto-login
        const savedUser = getCurrentUser();
        if (savedUser) {
            showLoggedInUI(savedUser);
        } else {
            const sidebarAuth = document.getElementById('sidebar-auth');
            sidebarAuth.innerHTML = `
                <a href="index.html" class="w-full bg-white text-[#171717] font-medium py-2.5 rounded-full hover:bg-gray-200 transition-colors text-[15px] text-center block">Log in</a>
                <a href="index.html" class="w-full bg-transparent text-white border border-[#333333] font-medium py-2.5 rounded-full hover:bg-[#232323] transition-colors text-[15px] text-center block">Sign up</a>
            `;
        }

        // ========== Create Project ==========
        const cpBackdrop = document.getElementById('create-project-backdrop');
        const cpPopup = document.getElementById('create-project-popup');
        const cpInput = document.getElementById('project-name-input');

        function openCreateProject() {
            cpBackdrop.style.display = 'block';
            cpPopup.style.display = 'block';
            cpInput.value = '';
            cpInput.focus();
        }
        function closeCreateProject() {
            cpBackdrop.style.display = 'none';
            cpPopup.style.display = 'none';
        }

        document.getElementById('create-project-btn')?.addEventListener('click', openCreateProject);
        document.getElementById('create-project-btn-empty')?.addEventListener('click', openCreateProject);
        document.getElementById('create-project-close').addEventListener('click', closeCreateProject);
        document.getElementById('create-project-cancel').addEventListener('click', closeCreateProject);
        cpBackdrop.addEventListener('click', closeCreateProject);

        document.getElementById('create-project-confirm').addEventListener('click', () => {
            const name = cpInput.value.trim();
            if (!name) return;
            const projects = getProjects();
            projects.push({ name, createdAt: Date.now(), chats: [] });
            saveProjects(projects);
            closeCreateProject();
            renderProjects();
        });

        cpInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('create-project-confirm').click();
            if (e.key === 'Escape') closeCreateProject();
        });

        function renderProjects() {
            const projects = getProjects();
            const emptyState = document.getElementById('empty-state');
            const projectsView = document.getElementById('projects-view');
            const grid = document.getElementById('projects-grid');

            if (projects.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                projectsView.classList.add('hidden');
                projectsView.classList.remove('flex');
                return;
            }

            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');
            projectsView.classList.remove('hidden');
            projectsView.classList.add('flex');

            grid.innerHTML = projects.map((p, i) => `
                <a href="project-view.html?id=${i}" class="bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl p-5 hover:border-[#444] transition-colors cursor-pointer group block">
                    <div class="flex items-center gap-3 mb-3">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path>
                        </svg>
                        <span class="text-white text-[14px] font-medium">${p.name}</span>
                    </div>
                    <p class="text-[#666] text-[12px]">${p.chats ? p.chats.length : 0} chats · ${p.files ? p.files.length : 0} files</p>
                </a>
            `).join('');
        }

        renderProjects();

        // Settings modal
        RetracSettingsModal.inject();
        document.getElementById('settings-btn')?.addEventListener('click', () => RetracSettingsModal.open());
        document.addEventListener('click', (e) => {
            const settingsLink = e.target.closest('#profile-dropdown a');
            if (settingsLink && settingsLink.textContent.trim() === 'Settings') {
                e.preventDefault();
                RetracSettingsModal.open();
            }
        });

        // Search Chat
        RetracSearchChat.inject();
        document.getElementById('search-chat-btn')?.addEventListener('click', (e) => {
            e.preventDefault();
            RetracSearchChat.open();
        });
    </script>

</body>
</html>

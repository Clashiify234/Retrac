<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.png" sizes="any">

    <title>Imagine - Retrac</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="js/retrac-api.js"></script>
    <script src="js/settings-modal.js"></script>
    <script src="js/auth-modal.js"></script>
    <script src="js/search-chat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; display: flex; height: 100vh; margin: 0; color: white; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .sidebar-collapsed { width: 60px !important; padding: 12px 6px !important; }
        .sidebar-collapsed .sidebar-hide { display: none !important; }
        .sidebar-collapsed .sidebar-header { justify-content: center !important; margin-bottom: 16px !important; }
        .sidebar-collapsed .sidebar-header > *:not(.sidebar-logo) { display: none !important; }
        .sidebar-collapsed nav { gap: 4px !important; align-items: center; }
        .sidebar-collapsed nav a { justify-content: center; padding: 10px; border-radius: 12px; width: 44px; height: 44px; margin: 0 auto; }
        .sidebar-collapsed nav a span { display: none !important; }
        .sidebar-collapsed nav a svg { margin: 0; width: 22px; height: 22px; }
        .sidebar-collapsed #sidebar-auth { align-items: center; }
        .sidebar-collapsed #sidebar-auth button { display: none; }
        .sidebar-collapsed #sidebar-auth > div { justify-content: center; }
        .sidebar-collapsed #sidebar-auth > div > div.flex-1 { display: none; }
        .sidebar-collapsed #sidebar-auth .go-pro-card { display: none; }
        aside#sidebar { transition: width 0.2s ease; }
        .masonry { columns: 4; column-gap: 4px; }
        .masonry-item { break-inside: avoid; margin-bottom: 4px; cursor: pointer; position: relative; overflow: hidden; border-radius: 4px; }
        .masonry-item img, .masonry-item video { width: 100%; display: block; transition: transform 0.3s ease; }
        .masonry-item:hover img, .masonry-item:hover video { transform: scale(1.03); }
        .cat-pill { white-space: nowrap; }
        .cat-pill.active { background: #000 !important; color: white !important; }

        /* Mode toggle pill */
        .mode-toggle {
            display: flex;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 9999px;
            padding: 3px;
            gap: 2px;
        }
        .mode-toggle button {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 18px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #888;
            background: transparent;
        }
        .mode-toggle button.active {
            background: #333;
            color: white;
        }
        .mode-toggle button:hover:not(.active) {
            color: #ccc;
        }
    
        /* ===== RESPONSIVE / MOBILE ===== */
        /* Prevent iOS zoom on input focus */
        input, textarea, select { font-size: 16px !important; }
        /* Fix 100vh on mobile browsers */
        @supports (height: 100dvh) { body { height: 100dvh; } }
        /* Smooth scrolling on iOS */
        * { -webkit-overflow-scrolling: touch; }
        /* Fix tap highlight */
        * { -webkit-tap-highlight-color: transparent; }

        /* Tablet */
        @media (max-width: 1024px) {
            #sidebar { width: 88px !important; padding: 12px 8px !important; }
            #sidebar .sidebar-hide { display: none !important; }
            #sidebar .sidebar-header { justify-content: center; }
            #sidebar #sidebar-auth { align-items: center; }
            #sidebar #sidebar-auth button { display: none; }
            #sidebar #sidebar-auth > div { justify-content: center; }
            #sidebar #sidebar-auth > div > div.flex-1 { display: none; }
            #sidebar #sidebar-auth .go-pro-card { display: none; }
            #sidebar nav { gap: 4px !important; }
            #sidebar nav a { flex-direction: column; justify-content: center; align-items: center; padding: 10px 4px; border-radius: 12px; gap: 4px !important; }
            #sidebar nav a span { display: block !important; font-size: 10px !important; opacity: 0.7; text-align: center; line-height: 1.2; }
            #sidebar nav a svg { margin: 0; width: 24px; height: 24px; }
            .mobile-menu-btn { display: none !important; }
        }

        /* Mobile */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed !important;
                left: -300px;
                top: 0;
                height: 100vh;
                z-index: 1000;
                width: 280px !important;
                transition: left 0.3s ease;
            }
            #sidebar.mobile-open { left: 0; }
            #sidebar .sidebar-hide { display: flex !important; }
            #sidebar .sidebar-header { justify-content: space-between; }
            #sidebar #sidebar-auth > div > div.flex-1 { display: block; }
            #sidebar nav a { justify-content: flex-start; padding: 8px 12px; }
            #sidebar nav a span { display: inline; }

            .mobile-backdrop {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .mobile-backdrop.active { display: block; }
            .mobile-menu-btn { display: flex !important; }
        }

        @media (max-width: 768px) {
            .masonry { columns: 2 !important; }
            .prompt-area { padding: 12px !important; }
        }
        @media (max-width: 480px) {
            .masonry { columns: 1 !important; }
        }

    </style>
</head>
<body class="antialiased">

<button class="mobile-menu-btn" style="display:none;position:fixed;top:12px;left:12px;z-index:998;background:#232323;border:1px solid #333;border-radius:8px;padding:8px;color:white;cursor:pointer;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="mobile-backdrop" id="mobile-backdrop"></div>


    <!-- Sidebar -->
    <aside id="sidebar" class="w-[280px] h-full bg-[#171717] flex flex-col p-4 border-r border-[#2a2a2a] shrink-0">

        <!-- Sidebar Header -->
        <div class="sidebar-header flex items-center justify-between mb-8 px-1 mt-1">
            <a href="index.html" class="sidebar-logo text-white hover:opacity-80 transition-opacity">
                <img src="logo.png" width="32" height="32" alt="Retrac" class="w-8 h-8">
            </a>

            <div class="flex items-center gap-3 sidebar-hide">
                <button class="text-[#a0a0a0] hover:text-white transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21l-4.3-4.3"></path>
                    </svg>
                </button>
                <button id="sidebar-toggle-btn" class="text-[#a0a0a0] bg-[#232323] border border-[#2e2e2e] p-1.5 rounded-lg hover:text-white hover:bg-[#252525] transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect>
                        <line x1="15" y1="3" x2="15" y2="21"></line>
                    </svg>
                </button>
            </div>
        </div>

        <!-- New Chat Button -->
        <a href="index.html" class="sidebar-hide flex items-center justify-between w-full bg-[#232323] hover:bg-[#252525] border border-[#333333] rounded-full py-2.5 px-4 mb-6 transition-colors group">
            <div class="flex items-center gap-3">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                <span class="font-medium text-[15px] text-[#f0f0f0]">New Chat</span>
            </div>
            <span class="text-[13px] text-[#707070] font-mono tracking-wide">Ctrl O</span>
        </a>

        <!-- Navigation -->
        <nav class="flex flex-col gap-1.5 px-1">
            <a href="imagine.html" class="sidebar-nav-link flex items-center gap-3.5 py-2 px-3 rounded-lg bg-[#232323] text-white">
                <svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="15" height="13" rx="2"/><path d="M17 10l5-3v10l-5-3v-4z"/><circle cx="9.5" cy="12.5" r="2.5" stroke-width="1.5"/></svg>
                <span class="text-[15px] font-medium sidebar-hide">Imagine</span>
            </a>
            <a href="finalize.html" class="sidebar-nav-link flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white">
                <svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
                <span class="text-[15px] font-medium sidebar-hide">Finalize</span>
            </a>
            <a href="#" id="search-chat-btn" class="sidebar-nav-link flex items-center gap-3.5 py-2 px-3 rounded-lg hover:bg-[#232323] transition-colors text-[#e0e0e0] hover:text-white">
                <svg class="shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.3-4.3"></path></svg>
                <span class="text-[15px] font-medium sidebar-hide">Search Chat</span>
            </a>
        </nav>

        <!-- Chat History -->
        <div id="chat-history-container" class="sidebar-hide mt-6 px-1 flex-1 overflow-y-auto">
            <p class="text-[#555] text-[13px] px-3">No chats yet</p>
        </div>

        <!-- Auth Buttons Bottom / User Profile -->
        <div id="sidebar-auth" class="mt-auto flex flex-col gap-3 pt-6 pb-2">
            <button onclick="document.getElementById('ghost-btn').click()" class="w-full bg-white text-[#171717] font-medium py-2.5 rounded-full hover:bg-gray-200 transition-colors text-[15px]">Log in</button>
            <button onclick="document.getElementById('ghost-btn').click()" class="w-full bg-transparent text-white border border-[#333333] font-medium py-2.5 rounded-full hover:bg-[#232323] transition-colors text-[15px]">Sign up</button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col bg-[#252525] overflow-hidden relative">
        <!-- Top bar with mode toggle -->
        <div class="flex flex-col items-center px-6 pt-4 pb-2 shrink-0">
            <!-- Image / Video toggle pill -->
            <div class="mode-toggle mb-3">
                <button id="mode-image" class="active" onclick="setMode('image')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    Image
                </button>
                <button id="mode-video" onclick="setMode('video')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><path d="M10 8l6 4-6 4V8z"></path></svg>
                    Video
                </button>
            </div>
            <!-- Inspiration / Your Creations tabs -->
            <div class="flex items-center gap-6">
                <button id="tab-inspiration" class="text-white text-[15px] font-semibold pb-1 border-b-2 border-white">Inspiration</button>
                <button id="tab-creations" class="text-[#888] text-[15px] font-medium pb-1 border-b-2 border-transparent hover:text-white transition-colors">Your Creations</button>
            </div>
        </div>

        <!-- Category pills -->
        <div class="flex items-center gap-2 px-6 pb-3 overflow-x-auto shrink-0" id="cat-bar">
            <button class="cat-pill active px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-black text-white transition-colors" data-cat="all">All</button>
            <button class="cat-pill px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-[#2f2f2f] text-[#ccc] hover:bg-[#3a3a3a] transition-colors" data-cat="trending">Trending</button>
            <button class="cat-pill px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-[#2f2f2f] text-[#ccc] hover:bg-[#3a3a3a] transition-colors" data-cat="logo">Logo</button>
            <button class="cat-pill px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-[#2f2f2f] text-[#ccc] hover:bg-[#3a3a3a] transition-colors" data-cat="tattoo">Tattoo</button>
            <button class="cat-pill px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-[#2f2f2f] text-[#ccc] hover:bg-[#3a3a3a] transition-colors" data-cat="home">Home</button>
            <button class="cat-pill px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-[#2f2f2f] text-[#ccc] hover:bg-[#3a3a3a] transition-colors" data-cat="realistic">Realistic Photos</button>
            <button class="cat-pill px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-[#2f2f2f] text-[#ccc] hover:bg-[#3a3a3a] transition-colors" data-cat="futuristic">Futuristic</button>
            <button class="cat-pill px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-[#2f2f2f] text-[#ccc] hover:bg-[#3a3a3a] transition-colors" data-cat="character">Character Design</button>
            <button class="cat-pill px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-[#2f2f2f] text-[#ccc] hover:bg-[#3a3a3a] transition-colors" data-cat="product">Product</button>
            <button class="cat-pill px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-[#2f2f2f] text-[#ccc] hover:bg-[#3a3a3a] transition-colors" data-cat="cartoon">Cartoon</button>
            <button class="cat-pill px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-[#2f2f2f] text-[#ccc] hover:bg-[#3a3a3a] transition-colors" data-cat="aiart">AI Art</button>
        </div>

        <!-- Image Grid (Inspiration) -->
        <div class="flex-1 overflow-y-auto px-2 pb-24" id="gallery-scroll">
            <div class="masonry" id="gallery">
                <!-- Images populated by JS -->
            </div>
        </div>

        <!-- Your Creations (hidden by default) -->
        <div id="creations-view" class="flex-1 overflow-y-auto pb-24" style="display:none;">
            <div class="flex flex-col items-center justify-center h-full">
                <p class="text-[#888] text-[15px]">No Creations Found</p>
            </div>
        </div>

        <!-- Bottom Prompt Bar -->
        <div class="absolute bottom-0 left-0 right-0 flex flex-col items-center pb-4 px-6" style="pointer-events:none;">
            <div class="w-full max-w-2xl bg-[#2f2f2f] rounded-[2rem] p-3 pl-4 pr-3 shadow-2xl border border-[#3e3e3e] flex flex-col gap-2 relative" style="pointer-events:auto;">

                <!-- Text Input -->
                <textarea rows="2" id="img-prompt" class="w-full bg-transparent text-[#f3f4f6] text-[16px] outline-none placeholder-[#8e8e8e] resize-none mt-1" placeholder="Describe an image to generate..."></textarea>

                <!-- Bottom Row: Controls -->
                <div class="flex items-center justify-between mt-1">
                    <!-- Left Controls -->
                    <div class="flex items-center gap-1.5">
                        <!-- Plus Button -->
                        <input type="file" id="img-file-input" multiple class="hidden" />
                        <button onclick="document.getElementById('img-file-input').click()" class="p-2 text-[#9ca3af] hover:text-white transition-colors rounded-full hover:bg-[#3f3f3f]">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>

                        <!-- Model Selector -->
                        <div class="relative ml-1">
                            <button id="img-model-btn" class="flex items-center gap-2 bg-[#212121] border border-[#3a3a3a] rounded-full px-3 py-1.5 hover:bg-[#2a2a2a] transition-colors">
                                <span id="img-model-label" class="text-[#d1d5db] text-[14px] font-medium">Nano Banana</span>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" class="ml-0.5"><polyline points="8 10 12 6 16 10"></polyline><polyline points="16 14 12 18 8 14"></polyline></svg>
                            </button>
                            <div id="img-model-dd" style="display:none; position:absolute; bottom:100%; left:0; margin-bottom:8px; width:190px; background:#2a2a2a; border:1px solid #3e3e3e; border-radius:12px; padding:4px; box-shadow:0 12px 40px rgba(0,0,0,0.6); z-index:60;">
                                <!-- Image models (default) -->
                                <button class="img-model-opt w-full text-left px-4 py-2.5 text-[14px] rounded-lg hover:bg-[#333] transition-colors text-white" data-model="Nano Banana">Nano Banana</button>
                                <button class="img-model-opt w-full text-left px-4 py-2.5 text-[14px] rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-model="Nano Banana Pro">Nano Banana Pro</button>
                                <button class="img-model-opt w-full text-left px-4 py-2.5 text-[14px] rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-model="Nano Banana 2">Nano Banana 2</button>
                                <button class="img-model-opt w-full text-left px-4 py-2.5 text-[14px] rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-model="Imagen 4">Imagen 4</button>
                            </div>
                        </div>

                        <!-- Aspect Ratio Selector -->
                        <div class="relative">
                            <button id="img-ratio-btn" class="flex items-center gap-1.5 bg-[#212121] border border-[#3a3a3a] rounded-full px-3 py-1.5 hover:bg-[#2a2a2a] transition-colors">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect></svg>
                                <span id="img-ratio-label" class="text-[#d1d5db] text-[14px] font-medium">1:1</span>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </button>
                            <div id="img-ratio-dd" style="display:none; position:absolute; bottom:100%; left:0; margin-bottom:8px; width:190px; background:#2a2a2a; border:1px solid #3e3e3e; border-radius:12px; padding:4px; box-shadow:0 12px 40px rgba(0,0,0,0.6); z-index:60;">
                                <!-- Image ratios (default) -->
                                <button class="img-ratio-opt w-full flex items-center gap-3 px-4 py-2.5 text-[14px] rounded-lg hover:bg-[#333] transition-colors text-white" data-ratio="1:1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect></svg>Square 1:1</button>
                                <button class="img-ratio-opt w-full flex items-center gap-3 px-4 py-2.5 text-[14px] rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-ratio="4:3"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"></rect></svg>Landscape 4:3</button>
                                <button class="img-ratio-opt w-full flex items-center gap-3 px-4 py-2.5 text-[14px] rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-ratio="16:9"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="6" width="22" height="12" rx="2"></rect></svg>Landscape 16:9</button>
                                <button class="img-ratio-opt w-full flex items-center gap-3 px-4 py-2.5 text-[14px] rounded-lg hover:bg-[#333] transition-colors text-[#888]" data-ratio="3:4"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"></rect></svg>Portrait 3:4</button>
                            </div>
                        </div>

                        <!-- Style Selector (hidden in video mode) -->
                        <div class="relative" id="style-selector-wrap">
                            <button id="img-style-btn" class="flex items-center gap-1.5 bg-[#212121] border border-[#3a3a3a] rounded-full px-3 py-1.5 hover:bg-[#2a2a2a] transition-colors">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><circle cx="13.5" cy="6.5" r="2.5"></circle><circle cx="6" cy="12" r="2.5"></circle><circle cx="8" cy="21" r="2.5"></circle><circle cx="17.5" cy="15.5" r="2.5"></circle><path d="M21 12a9 9 0 1 1-9-9c4.97 0 9 2.69 9 6 0 2.21-1.79 4-4 4h-1.93a2 2 0 0 0-1.41 3.41l.07.07A2 2 0 0 1 13.5 20H12"></path></svg>
                                <span id="img-style-label" class="text-[#d1d5db] text-[14px] font-medium">Style</span>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </button>
                            <div id="img-style-dd" style="display:none; position:absolute; bottom:100%; left:0; margin-bottom:8px; width:190px; max-height:360px; overflow-y:auto; background:#2a2a2a; border:1px solid #3e3e3e; border-radius:12px; padding:4px; box-shadow:0 12px 40px rgba(0,0,0,0.6); z-index:60;">

        // ========== Gallery Images ==========
        const galleryImages = [

        const gallery = document.getElementById('gallery');
        function renderGallery() {
            gallery.innerHTML = '';
            galleryImages.forEach((img, i) => {
                const div = document.createElement('div');

        renderGallery();

        // ========== Modal ==========
        const modalBackdrop = document.getElementById('img-modal-backdrop');

        // ========== Dropdowns ==========
        const allDDs = [];
        function setupDD(btnId, ddId, optClass, labelId, getLabelFn) {
            const btn = document.getElementById(btnId);
            const dd = document.getElementById(ddId);
            if (!btn || !dd) return;
            allDDs.push(dd);
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const open = dd.style.display !== 'none';
                allDDs.forEach(d => d.style.display = 'none');
                dd.style.display = open ? 'none' : 'block';
            });
            document.querySelectorAll('.' + optClass).forEach(opt => {
                opt.addEventListener('click', () => {
                    document.querySelectorAll('.' + optClass).forEach(o => { o.classList.remove('text-white'); o.classList.add('text-[#888]'); });
                    opt.classList.remove('text-[#888]'); opt.classList.add('text-white');
                    if (labelId) document.getElementById(labelId).textContent = getLabelFn(opt);
                    dd.style.display = 'none';
                });
            });
            dd.addEventListener('click', (e) => e.stopPropagation());
        }

        setupDD('img-model-btn', 'img-model-dd', 'img-model-opt', 'img-model-label', o => o.dataset.model);

        setupDD('img-style-btn', 'img-style-dd', 'img-style-opt', 'img-style-label', o => {
            const s = o.dataset.style;
            return s === 'none' ? 'Style' : o.textContent.trim();

        setupDD('img-duration-btn', 'img-duration-dd', 'img-duration-opt', 'img-duration-label', o => o.dataset.duration + 's');

        document.addEventListener('click', () => { allDDs.forEach(d => d.style.display = 'none'); });

        // ========== Generation ==========
        const imgPrompt = document.getElementById('img-prompt');
        const generateBtn = document.getElementById('generate-btn');
        // ========== IndexedDB Storage for Creations ==========
        const CreationsDB = {
            DB_NAME: 'retrac_creations_db',
            STORE_NAME: 'creations',
            DB_VERSION: 1,
            _db: null,
            async open() {
                if (this._db) return this._db;
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.DB_NAME, this.DB_VERSION);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.STORE_NAME)) {
                            db.createObjectStore(this.STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        }
                    };
                    req.onsuccess = () => { this._db = req.result; resolve(req.result); };
                    req.onerror = () => reject(req.error);
                });
            },
            async getAll() {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(this.STORE_NAME, 'readonly');
                    const store = tx.objectStore(this.STORE_NAME);
                    const req = store.getAll();
                    req.onsuccess = () => resolve(req.result.reverse());
                    req.onerror = () => reject(req.error);
                });
            },
            async add(creation) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(this.STORE_NAME, 'readwrite');
                    const store = tx.objectStore(this.STORE_NAME);
                    const req = store.add(creation);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            },
            async delete(id) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(this.STORE_NAME, 'readwrite');
                    const store = tx.objectStore(this.STORE_NAME);
                    const req = store.delete(id);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            }
        };

        let userCreations = [];

        async function initCreations() {
            // Migrate from localStorage if data exists
            const oldData = localStorage.getItem('retrac_creations');
            if (oldData) {
                try {
                    const old = JSON.parse(oldData);
                    for (const c of old) {
                        if (!c.type) c.type = 'image';
                        // Skip broken /uploads/ URLs that won't work after redeploy
                        if (c.url && c.url.startsWith('/uploads/')) continue;
                        await CreationsDB.add(c);
                    }
                    localStorage.removeItem('retrac_creations');
                } catch (e) {
                    console.warn('Creations migration failed:', e);
                }
            }
            userCreations = await CreationsDB.getAll();
            renderCreations();
        }
        initCreations();

        async function generate() {
            const prompt = imgPrompt.value.trim();
            if (!prompt) return;

            // Switch to creations tab
            tabCrea.click();

            if (currentMode === 'image') {
                await generateImage(prompt);
            } else {
                await generateVideo(prompt);
            }

            imgPrompt.value = '';
        }

        async function generateImage(prompt) {
            // Show loading state
            const loadingEl = document.createElement('div');
            loadingEl.className = 'flex flex-col items-center justify-center h-full gap-4';
            loadingEl.innerHTML = `
                <div class="w-8 h-8 border-2 border-[#555] border-t-white rounded-full animate-spin"></div>
                <p class="text-[#888] text-[14px]">Generating your image...</p>
                <p class="text-[#555] text-[12px] max-w-xs text-center">"${prompt.length > 60 ? prompt.slice(0, 60) + '...' : prompt}"</p>
            `;
            creationsView.innerHTML = '';
            creationsView.appendChild(loadingEl);

            try {
                const style = document.getElementById('img-style-label').textContent;
                const ratio = document.getElementById('img-ratio-label').textContent;
                const selectedModel = document.getElementById('img-model-label').textContent;
                let fullPrompt = prompt;
                if (style && style !== 'Style' && style !== 'No Style') fullPrompt += `, ${style} style`;

                const result = await RetracAPI.generateImage(fullPrompt, selectedModel, ratio);
                if (result.error) {
                    creationsView.innerHTML = `<div class="flex flex-col items-center justify-center h-full"><p class="text-red-400 text-[14px]">${result.error}</p></div>`;
                    return;
                }

                const creation = { type: 'image', url: result.url, prompt, revisedPrompt: result.revised_prompt, createdAt: Date.now() };
                await CreationsDB.add(creation);
                userCreations = await CreationsDB.getAll();
                renderCreations();
            } catch (err) {
                creationsView.innerHTML = `<div class="flex flex-col items-center justify-center h-full"><p class="text-red-400 text-[14px]">${err.message}</p></div>`;
            }
        }

        async function generateVideo(prompt) {
            // Show loading state
            const loadingEl = document.createElement('div');
            loadingEl.className = 'flex flex-col items-center justify-center h-full gap-4';
            loadingEl.innerHTML = `
                <div class="w-8 h-8 border-2 border-[#555] border-t-white rounded-full animate-spin"></div>
                <p class="text-[#888] text-[14px]">Generating video... This may take 1-3 minutes</p>
                <p class="text-[#555] text-[12px] max-w-xs text-center">"${prompt.length > 60 ? prompt.slice(0, 60) + '...' : prompt}"</p>
            `;
            creationsView.innerHTML = '';
            creationsView.appendChild(loadingEl);

            try {
                const ratio = document.getElementById('img-ratio-label').textContent;
                const selectedModel = document.getElementById('img-model-label').textContent;
                const duration = parseInt(document.getElementById('img-duration-label').textContent);

                const result = await RetracAPI.generateVideo(prompt, selectedModel, ratio, duration);
                if (result.error) {
                    creationsView.innerHTML = `<div class="flex flex-col items-center justify-center h-full"><p class="text-red-400 text-[14px]">${result.error}</p></div>`;
                    return;
                }

                const creation = { type: 'video', url: result.url, prompt, createdAt: Date.now() };
                await CreationsDB.add(creation);
                userCreations = await CreationsDB.getAll();
                renderCreations();
            } catch (err) {
                creationsView.innerHTML = `<div class="flex flex-col items-center justify-center h-full"><p class="text-red-400 text-[14px]">${err.message}</p></div>`;
            }
        }

        function renderCreations() {
            if (userCreations.length === 0) {
                creationsView.innerHTML = '<div class="flex flex-col items-center justify-center h-full"><p class="text-[#888] text-[15px]">No Creations Found</p><p class="text-[#555] text-[13px] mt-2">Generate an image or video using the prompt bar below.</p></div>';
                return;
            }
            creationsView.innerHTML = `<div class="masonry px-4 pt-4">${userCreations.map((c, i) => {
                if (c.type === 'video') {
                    return `<div class="masonry-item creation-item" data-idx="${i}">
                        <video src="${c.url}" muted loop preload="metadata" onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0;"></video>
                        <div style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.6);border-radius:6px;padding:2px 8px;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="white" stroke="none"><path d="M10 8l6 4-6 4V8z"/></svg>
                        </div>
                    </div>`;
                } else {
                    return `<div class="masonry-item creation-item" data-idx="${i}">
                        <img src="${c.url}" alt="${c.prompt}" loading="lazy" />
                    </div>`;
                }
            }).join('')}</div>`;

            creationsView.querySelectorAll('.creation-item').forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.dataset.idx);
                    const c = userCreations[idx];
                    openCreationModal(c);
                });
            });
        }

        generateBtn?.addEventListener('click', generate);
        imgPrompt?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
        });

        // Reuse Prompt button
        document.getElementById('modal-reuse-btn')?.addEventListener('click', () => {
            imgPrompt.value = modalDesc.textContent;
            closeModal();
            imgPrompt.focus();
        });

        // Edit with Chat button
        document.getElementById('modal-edit-btn')?.addEventListener('click', () => {
            const prompt = modalDesc.textContent;
            closeModal();
            window.location.href = 'index.html';
        });

        // Download button
        document.getElementById('modal-download')?.addEventListener('click', () => {
            const mediaEl = modalMediaContainer.querySelector('video') || modalMediaContainer.querySelector('img');
            if (!mediaEl) return;
            const a = document.createElement('a');
            a.href = mediaEl.src;
            a.download = mediaEl.tagName === 'VIDEO' ? 'retrac-video.mp4' : 'retrac-image.png';
            a.target = '_blank';
            a.click();
        });

        // Render existing creations
        renderCreations();

        // Settings
        RetracSettingsModal.inject();

        // ========== Auth ==========
        const user = getCurrentUser();
        if (user) {
            const sa = document.getElementById('sidebar-auth');
            const name = user.name || user.email.split('@')[0];
            const av = user.picture
                ? `<img src="${user.picture}" class="w-9 h-9 rounded-full object-cover shrink-0" referrerpolicy="no-referrer" />`
                : `<div class="w-9 h-9 rounded-full bg-[#333] flex items-center justify-center text-white text-[14px] font-semibold shrink-0">${name[0].toUpperCase()}</div>`;
            sa.innerHTML = `
                <div class="bg-[#2D8CFF] rounded-2xl p-4 flex items-center justify-between mb-3 cursor-pointer hover:brightness-110 transition go-pro-card">
                    <div class="flex items-center gap-3">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="white" stroke="none"><path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2z"></path></svg>
                        <div><p class="text-white text-[13px] font-semibold">Go Pro</p><p class="text-white/70 text-[10px]">Upgrade your plan</p></div>
                    </div>
                    <span class="bg-white text-black text-[11px] font-semibold px-3 py-1 rounded-full">Upgrade</span>
                </div>
                <div class="flex items-center gap-3 px-1 py-1 cursor-pointer hover:bg-[#232323] rounded-lg transition-colors" onclick="logoutUser()">
                    ${av}
                    <div class="flex-1 min-w-0"><p class="text-white text-[13px] font-medium truncate">${name}</p><p class="text-[#666] text-[10px]">Free</p></div>
                </div>`;
        }

        // Search Chat
        RetracSearchChat.inject();
        document.getElementById('search-chat-btn')?.addEventListener('click', (e) => {
            e.preventDefault();
            RetracSearchChat.open();
        });
    </script>

<script>
    // Mobile menu
    const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
    const mobileBackdrop = document.getElementById('mobile-backdrop');
    if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', () => {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('mobile-open');
            mobileBackdrop.classList.toggle('active');
        });
        mobileBackdrop?.addEventListener('click', () => {
            const sb = document.getElementById('sidebar');
            sb.classList.remove('mobile-open');
            mobileBackdrop.classList.remove('active');
        });
        document.querySelectorAll('#sidebar nav a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    const sb = document.getElementById('sidebar');
                    sb.classList.remove('mobile-open');
                    mobileBackdrop.classList.remove('active');
                }
            });
        });
    }

</script>
</body>
</html>
